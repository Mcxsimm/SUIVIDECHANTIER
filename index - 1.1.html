        </select>
      </td>
      <td><input type="text" name="avenants.${i}.obs" value="${esc(av.obs)}" style="width:110px"></td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="avenants" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');

  // ── RAF table ───────────────────────────────────────────────────────────────
  let rafTotBI=0,rafTotBV=0,rafTotReel=0,rafTotRAD=0,rafTotEAC=0;
  const rafRows=c.rafDefs.map(row=>{
    const rl=d.raf.lines[row.id]||{};
    const bi=n(rl.bi);const bv=n(rl.bv);
    const rad=n(rl.rad);
    const reel=row.manual?n(rl.reel):row.reel;
    const eng=row.manual?n(rl.eng):row.eng;
    const eac=reel+rad;
    const pctCA=c.marcheActualise>0?eac/c.marcheActualise*100:0;
    const monthVal=c.rafCnt>0?rad/c.rafCnt:0;
    const ecartRAF=bv>0?bv-eac:0;
    rafTotBI+=bi;rafTotBV+=bv;rafTotReel+=reel;rafTotRAD+=rad;rafTotEAC+=eac;
    return`<tr>
      <td class="sticky" style="font-weight:500">${esc(row.label)}</td>
      <td style="font-size:11px;color:var(--sub);white-space:nowrap">${esc(row.src)}</td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.bi" value="${rl.bi||''}" style="width:80px"></div></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.bv" value="${rl.bv||''}" style="width:80px"></div></td>
      <td class="auto">${reel>0?eurRaw(reel):'—'}</td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.rad" value="${rl.rad||''}" style="width:80px"></div></td>
      <td class="auto" style="font-weight:600">${eac>0?eurRaw(eac):'—'}</td>
      <td class="auto" style="color:${ecartRAF<0?'var(--neg)':ecartRAF>0?'var(--pos)':'var(--sub)'}">${bv>0?eurRaw(ecartRAF):'—'}</td>
      <td class="auto">${pctCA>0?pctCA.toFixed(1)+'%':'—'}</td>
      ${row.manual
        ?`<td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.reel" value="${rl.reel||''}" style="width:75px"></div></td><td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.eng" value="${rl.eng||''}" style="width:75px"></div></td>`
        :`<td class="auto">${reel>0?eurRaw(reel):'—'}</td><td class="auto">${eng>0?eurRaw(eng):'—'}</td>`}
      ${c.rafMonths.map(m=>`<td class="auto" style="white-space:nowrap;color:var(--sub)">${monthVal>0?eurRaw(monthVal):'—'}</td>`).join('')}
    </tr>`;
  }).join('');

  const rafTotPctCA=c.marcheActualise>0?rafTotEAC/c.marcheActualise*100:0;
  const rafTotEcart=rafTotBV>0?rafTotBV-rafTotEAC:0;

  // ── Synthèse marché ─────────────────────────────────────────────────────────
  function flowBox(label,value,color='var(--text)',sub=''){
    return`<div style="flex:1;min-width:130px;background:#fff;border-radius:10px;padding:14px 16px;border:1px solid var(--border)">
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">${label}</div>
      <div style="font-size:17px;font-weight:700;color:${color}">${value}</div>
      ${sub?`<div style="font-size:11px;color:var(--sub);margin-top:2px">${sub}</div>`:''}
    </div>`;
  }
  const arrow=`<div style="color:var(--sub);font-size:18px;align-self:center">→</div>`;

  return`
    <h1 class="page-title">Suivi financier</h1>

    <!-- Saisie paramètres de base -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Paramètres financiers</div>
      <div class="form-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
        <div class="form-field"><label class="form-label">Marché initial HT</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.marcheInitial" value="${d.finance.marcheInitial||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Avenants signés</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.avenantsSignes" value="${d.finance.avenantsSignes||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Budget CR (coût revient)</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.budgetCR" value="${d.finance.budgetCR||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Réel engagé à date</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.reelEngage" value="${d.finance.reelEngage||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Reste à engager</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.resteAEngager" value="${d.finance.resteAEngager||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Frais généraux chantier</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.fgChantier" value="${d.finance.fgChantier||''}" class="form-input"></div></div>
      </div>
    </div>

    <!-- Flux financier visuel -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Vue d'ensemble financière</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;margin-bottom:16px">
        ${flowBox('Marché initial',c.marcheInitial>0?eurRaw(c.marcheInitial):'—')}
        ${arrow}
        ${flowBox('+ Avenants signés',c.avenantsSignes>0?'+'+eurRaw(c.avenantsSignes):c.avenantsSignes<0?eurRaw(c.avenantsSignes):'—',c.avenantsSignes>=0?'var(--pos)':'var(--neg)')}
        ${arrow}
        ${flowBox('= Marché actualisé',c.marcheActualise>0?eurRaw(c.marcheActualise):'—','var(--acc)')}
        ${arrow}
        ${flowBox('Budget CR',c.budgetCR>0?eurRaw(c.budgetCR):'—')}
        ${arrow}
        ${flowBox('EAC',c.eac>0?eurRaw(c.eac):'—')}
        ${arrow}
        ${flowBox('Marge brute',c.budgetCR>0?eurRaw(c.margeBrute):'—',c.margeBrute<0?'var(--neg)':'var(--pos)',c.budgetCR>0?pct(c.tauxMarge):'')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <!-- Facturation -->
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px">Facturation</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>Facturé</span><strong>${c.totalFacture>0?eurRaw(c.totalFacture):'—'}</strong>
          </div>
          <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${Math.min(txFact,100)}%;background:var(--acc)"></div></div>
          <div class="note">${txFact.toFixed(1)}% du marché actualisé${retardsSit>0?` · <span style="color:var(--neg)">${retardsSit} retard${retardsSit>1?'s':''}</span>`:''}</div>
        </div>
        <!-- Encaissement -->
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px">Encaissement</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>Encaissé</span><strong>${c.totalEncaisse>0?eurRaw(c.totalEncaisse):'—'}</strong>
          </div>
          <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${Math.min(txEnc,100)}%;background:var(--pos)"></div></div>
          <div class="note">${txEnc.toFixed(1)}% des situations facturées</div>
        </div>
        <!-- RAF -->
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px">Reste à faire total</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>RAD consolidé</span><strong>${rafTotRAD>0?eurRaw(rafTotRAD):'—'}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub)">
            <span>EAC RAF</span><span>${rafTotEAC>0?eurRaw(rafTotEAC):'—'}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Budget vs Réel par poste -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">Budget vs Réel par poste analytique</div>
        ${c.hConso>0?`<div style="font-size:12px;background:#e8f4fd;border:1px solid #b3d9f5;border-radius:6px;padding:6px 12px;color:#0056b3">
          Heures MO : <strong>${c.hConso}h</strong> × <strong>${c.txH||n(d.heures.txHoraire)}€/h</strong> = <strong>${moReelAuto.toLocaleString('fr-FR')} €</strong>
          &nbsp;·&nbsp; Assignez "⟳ Heures MO" à un poste pour lier automatiquement
        </div>`:''}
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Poste</th><th>Source</th><th>Budget prévu</th><th>Réel engagé</th><th>Reste à engager</th><th>Écart (B-EAC)</th><th>Avancement</th><th></th></tr></thead>
          <tbody>${posteRows}</tbody>
          <tfoot><tr style="background:#f0f2f5;font-weight:700">
            <td colspan="2">Total</td>
            <td>${posteTotBP>0?eurRaw(posteTotBP):'—'}</td>
            <td>${posteTotRE>0?eurRaw(posteTotRE):'—'}</td>
            <td>${posteTotRAE>0?eurRaw(posteTotRAE):'—'}</td>
            <td style="color:${(posteTotBP-posteTotRE-posteTotRAE)<0?'var(--neg)':'var(--pos)'}">
              ${posteTotBP>0?eurRaw(posteTotBP-posteTotRE-posteTotRAE):'—'}
            </td>
            <td colspan="2"></td>
          </tr></tfoot>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="postes">${svgIcon(ico.plus,13)} Ajouter poste</button>
    </div>

    <!-- Situations de travaux -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">Situations de travaux</div>
        <div style="display:flex;gap:12px;font-size:12px">
          <span>Facturé : <strong>${c.totalFacture>0?eurRaw(c.totalFacture):'—'}</strong></span>
          <span>Encaissé : <strong style="color:var(--pos)">${c.totalEncaisse>0?eurRaw(c.totalEncaisse):'—'}</strong></span>
          ${retardsSit>0?`<span style="color:var(--neg);font-weight:600">${retardsSit} retard${retardsSit>1?'s':''}</span>`:''}
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>N°</th><th>Période</th><th>Date envoi</th><th>Montant HT</th><th>Cumul HT</th><th>% marché</th><th>Date paiement</th><th>Délai</th><th>Statut</th><th>État</th><th></th></tr></thead>
          <tbody>${sitRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="situations">${svgIcon(ico.plus,13)} Ajouter situation</button>
    </div>

    <!-- Avenants -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">Avenants</div>
        <div style="font-size:12px">
          Cumul avenants : <strong style="color:${avCumul>=0?'var(--pos)':'var(--neg)'}">${avCumul!==0?eurRaw(avCumul):'—'}</strong>
          &nbsp;·&nbsp; ${d.avenants.filter(a=>a.statut==='Signé').length} signé(s) / ${d.avenants.filter(a=>a.designation).length} total
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>N°</th><th>Désignation</th><th>Date</th><th>Montant HT</th><th>Impact délai</th><th>Poste</th><th>Statut</th><th>Obs.</th><th></th></tr></thead>
          <tbody>${avRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="avenants">${svgIcon(ico.plus,13)} Ajouter avenant</button>
    </div>

    <!-- RAF -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Reste à faire (RAF)</div>
      <div class="param-row" style="margin-bottom:10px">
        <div class="form-field"><label class="form-label">Mois de référence</label><input type="month" name="raf.moisRef" value="${d.raf.moisRef||''}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Clé SAP</label><input type="text" name="raf.cle" value="${esc(d.raf.cle)}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Méthode</label><select name="raf.methode" class="form-select">
          ${['Avancement physique','À terminaison','Réengagement'].map(v=>`<option${d.raf.methode===v?' selected':''}>${v}</option>`).join('')}
        </select></div>
        <div class="form-field" style="flex:2"><label class="form-label">Commentaires</label><input type="text" name="raf.commentaires" value="${esc(d.raf.commentaires)}" class="form-input"></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="position:sticky;left:0;background:#f0f2f5;z-index:2;min-width:130px">Poste</th>
            <th>Source</th><th>Budget init.</th><th>Budget validé</th>
            <th>Réel cumulé</th><th>Reste à dép.</th><th>EAC</th><th>Écart BV-EAC</th><th>% CA</th>
            <th>Réel M</th><th>Engagement</th>
            ${c.rafMonths.map(m=>`<th style="white-space:nowrap">${m}</th>`).join('')}
          </tr></thead>
          <tbody>${rafRows}</tbody>
          <tfoot><tr style="background:#f0f2f5;font-weight:700">
            <td colspan="2">Total RAF</td>
            <td>${rafTotBI>0?eurRaw(rafTotBI):'—'}</td>
            <td>${rafTotBV>0?eurRaw(rafTotBV):'—'}</td>
            <td>${rafTotReel>0?eurRaw(rafTotReel):'—'}</td>
            <td>${rafTotRAD>0?eurRaw(rafTotRAD):'—'}</td>
            <td>${rafTotEAC>0?eurRaw(rafTotEAC):'—'}</td>
            <td style="color:${rafTotEcart<0?'var(--neg)':'var(--pos)'}">${rafTotBV>0?eurRaw(rafTotEcart):'—'}</td>
            <td>${rafTotPctCA>0?rafTotPctCA.toFixed(1)+'%':'—'}</td>
            <td colspan="${2+c.rafMonths.length}"></td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  `;
}

// ST
function renderST(d,c){
  const stKpis=[
    ['ST actifs',c.stActifs,'var(--text)'],
    ['Marché ST total',c.stTotal>0?eurRaw(c.stTotal):'—','var(--text)'],
    ['Situations émises',c.stSitTotal>0?eurRaw(c.stSitTotal):'—','var(--text)'],
    ['DC4 manquants',c.stDC4>0?c.stDC4:'0',c.stDC4>0?'var(--neg)':'var(--pos)'],
  ];
  const rows=d.st.map((s,i)=>{
    const dc4Color=s.dc4==='Oui'?'var(--pos)':'var(--neg)';
    const agColor=s.agrement==='Oui'?'var(--pos)':'var(--warn)';
    return`<tr>
      <td><span class="dot" style="background:${s.entreprise?(s.dc4==='Oui'?'var(--pos)':'var(--warn)'):'var(--border)'}"></span></td>
      <td><input type="text" name="st.${i}.entreprise" value="${esc(s.entreprise)}" style="width:140px"></td>
      <td><input type="text" name="st.${i}.lot" value="${esc(s.lot)}" style="width:100px"></td>
      <td><select name="st.${i}.categorie">
        ${['ST Moyen','ST Compétence'].map(v=>`<option${s.categorie===v?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.montantHT" value="${s.montantHT||''}" style="width:90px"></div></td>
      <td style="color:${dc4Color};font-weight:600">
        <select name="st.${i}.dc4" style="color:${dc4Color}">
          ${['Oui','Non'].map(v=>`<option${s.dc4===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td style="color:${agColor};font-weight:600">
        <select name="st.${i}.agrement" style="color:${agColor}">
          ${['Oui','Non'].map(v=>`<option${s.agrement===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.mtSit" value="${s.mtSit||''}" style="width:85px"></div></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.rg" value="${s.rg||''}" style="width:70px"></div></td>
      <td><select name="st.${i}.statut">
        ${['—','En cours','Terminé','Litigieux'].map(v=>`<option${s.statut===v?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="st" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');
  return`
    <h1 class="page-title">Sous-traitants</h1>
    <div class="kpi-strip">
      ${stKpis.map(([l,v,col])=>`<div class="kpi-card"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${col};font-size:17px">${v}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Liste des sous-traitants</div>
      <div style="display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--sub)">
        <span><span class="dot" style="background:var(--pos);display:inline-block;margin-right:4px"></span>DC4 conforme</span>
        <span><span class="dot" style="background:var(--warn);display:inline-block;margin-right:4px"></span>DC4 à régulariser</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th></th><th>Entreprise</th><th>Lot</th><th>Catégorie</th><th>Marché HT</th><th>DC4</th><th>Agrément</th><th>Mt Situation</th><th>RG</th><th>Statut</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="st">${svgIcon(ico.plus,13)} Ajouter sous-traitant</button>
    </div>
  `;
}

// Fournisseurs
function renderFournisseurs(d,c){
  const rows=d.fournisseurs.map((f,i)=>`<tr>
    <td><input type="text" name="fournisseurs.${i}.fournisseur" value="${esc(f.fournisseur)}" style="width:130px"></td>
    <td><input type="text" name="fournisseurs.${i}.designation" value="${esc(f.designation)}" style="width:150px"></td>
    <td><select name="fournisseurs.${i}.categorie">
      ${['Fournitures','Matériel','Services'].map(v=>`<option${f.categorie===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><input type="text" name="fournisseurs.${i}.numBC" value="${esc(f.numBC)}" style="width:90px"></td>
    <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="fournisseurs.${i}.montant" value="${f.montant||''}" style="width:90px"></div></td>
    <td><input type="date" name="fournisseurs.${i}.livraison" value="${f.livraison||''}"></td>
    <td><select name="fournisseurs.${i}.recu">
      ${['Non','Oui','Partiel'].map(v=>`<option${f.recu===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><select name="fournisseurs.${i}.statut">
      ${['—','En commande','Livré','Litigieux'].map(v=>`<option${f.statut===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="fournisseurs" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');
  return`
    <h1 class="page-title">Fournisseurs</h1>
    <div class="kpi-strip">
      <div class="kpi-card"><div class="kpi-label">Fournisseurs actifs</div><div class="kpi-value">${c.fournActifs}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total engagé</div><div class="kpi-value" style="font-size:17px">${c.fTotal>0?eurRaw(c.fTotal):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Fournitures engagées</div><div class="kpi-value" style="font-size:17px">${d.fournisseurs.filter(f=>f.categorie==='Fournitures').reduce((s,f)=>s+n(f.montant),0)>0?eurRaw(d.fournisseurs.filter(f=>f.categorie==='Fournitures').reduce((s,f)=>s+n(f.montant),0)):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Matériel engagé</div><div class="kpi-value" style="font-size:17px">${d.fournisseurs.filter(f=>f.categorie==='Matériel').reduce((s,f)=>s+n(f.montant),0)>0?eurRaw(d.fournisseurs.filter(f=>f.categorie==='Matériel').reduce((s,f)=>s+n(f.montant),0)):'—'}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Liste des fournisseurs</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Fournisseur</th><th>Désignation</th><th>Catégorie</th><th>N° BC</th><th>Montant HT</th><th>Livraison prev.</th><th>Reçu</th><th>Statut</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="fournisseurs">${svgIcon(ico.plus,13)} Ajouter fournisseur</button>
    </div>
  `;
}

// ─── getVal helper ────────────────────────────────────────────────────────────
function getVal(d,path){
  const parts=path.split('.');
  let obj=d;
  for(const k of parts){
    if(obj===null||obj===undefined)return'';
    obj=obj[k];
  }
  return obj??'';
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render(){
  renderShell();
  renderNav();
  const main=document.getElementById('main');
  const ch=getActive();
  if(state.screen==='portfolio'){
    main.innerHTML=renderPortfolio();
    const pfs=document.getElementById('pf-search');
    if(pfs&&pfs.addEventListener)pfs.addEventListener('input',e=>{state.pfQuery=e.target.value;render()});
    return;
  }
  if(!ch){
    main.innerHTML=`<div style="padding:40px;text-align:center;color:var(--sub)">
      <p>Aucun chantier sélectionné.</p>
      <button class="btn btn-primary" style="margin-top:12px" data-action="addChantier">Créer un chantier</button>
    </div>`;
    return;
  }
  const d=ch.d;
  const c=computeAll(d);
  const screens={
    home:()=>renderHome(d,c),
    dashboard:()=>renderDashboard(d,c),
    finance:()=>renderFinance(d,c),
    st:()=>renderST(d,c),
    fournisseurs:()=>renderFournisseurs(d,c),
    planning:()=>renderPlanning(d,c),
    heures:()=>renderHeures(d,c),
    reserves:()=>renderReserves(d,c),
    checklist:()=>renderChecklist(d,c),
    ts:()=>renderTS(d,c),
    cr:()=>renderCR(d,c),
  };
  const fn=screens[state.screen];
  main.innerHTML=fn?fn():`<div style="padding:40px;color:var(--sub)">Écran inconnu : ${esc(state.screen)}</div>`;
  // wire home tiles
  main.querySelectorAll('.tile[data-screen]').forEach(el=>{
    el.addEventListener('click',()=>{state.screen=el.dataset.screen;render()});
  });
}

// ─── Shell & Nav renderers ────────────────────────────────────────────────────
function renderShell(){
  const ch=getActive();
  const chOptions=state.chantiers.map(c=>`<option value="${c.id}"${c.id===state.activeId?' selected':''}>${esc(c.d.ident.nom||'Sans nom')}</option>`).join('');
  document.getElementById('shell').innerHTML=`
    <button class="logo-btn" data-action="goHome" title="Accueil">SC</button>
    <button class="pf-btn" data-action="goPortfolio">
      ${svgIcon(ico.brief,14)} Portefeuille
    </button>
    <div class="divider"></div>
    ${state.chantiers.length>0?`<select id="chantier-sw">${chOptions}</select>`:''}
    <input class="shell-search" type="text" placeholder="Rechercher…" id="shell-search">
    <div class="spacer"></div>
    <button class="notif-btn" title="Notifications">
      ${svgIcon(ico.bell,18)}
      ${(ch&&summarize(ch.d).alertCount>0)?'<span class="notif-dot"></span>':''}
    </button>
    <div class="avatar" title="Mon compte">CA</div>
  `;
}

const NAV_ITEMS=[
  {id:'portfolio',icon:ico.brief,label:'Portfolio',screen:'portfolio'},
  {id:'home',icon:ico.home,label:'Accueil',screen:'home'},
  {sep:true},
  {id:'dashboard',icon:ico.dash,label:'Tableau',screen:'dashboard'},
  {id:'finance',icon:ico.fin,label:'Finances',screen:'finance'},
  {id:'st',icon:ico.st,label:'ST',screen:'st'},
  {id:'fournisseurs',icon:ico.fourn,label:'Fourn.',screen:'fournisseurs'},
  {id:'planning',icon:ico.plan,label:'Planning',screen:'planning'},
  {id:'heures',icon:ico.heure,label:'Heures',screen:'heures'},
  {id:'reserves',icon:ico.res,label:'Réserves',screen:'reserves'},
  {id:'checklist',icon:ico.check,label:'Checklist',screen:'checklist'},
  {id:'ts',icon:ico.ts,label:'TS/Aléas',screen:'ts'},
  {id:'cr',icon:ico.cr,label:'CR',screen:'cr'},
];

function renderNav(){
  document.getElementById('nav-rail').innerHTML=NAV_ITEMS.map(item=>{
    if(item.sep)return'<div class="nav-sep"></div>';
    const active=state.screen===item.screen;
    return`<button class="nav-item${active?' active':''}" data-screen="${item.screen}" title="${item.label}">
      ${svgIcon(item.icon,18)}
      <span class="nav-tip">${item.label}</span>
    </button>`;
  }).join('');
}

// ─── Portfolio screen ─────────────────────────────────────────────────────────
function renderPortfolio(){
  const all=state.chantiers;
  const q=(state.pfQuery||'').toLowerCase();
  const sf=state.pfStatut||'all';
  let filtered=all;
  if(q)filtered=filtered.filter(c=>{
    const s=summarize(c.d);
    return s.nom.toLowerCase().includes(q)||c.d.ident.otp.toLowerCase().includes(q);
  });
  if(sf!=='all')filtered=filtered.filter(c=>summarize(c.d).statut===sf);

  // Portfolio KPIs
  const total=all.length;
  const marcheCum=all.reduce((s,c)=>s+summarize(c.d).marcheActualise,0);
  const margeCum=all.reduce((s,c)=>s+summarize(c.d).marge,0);
  const alertCum=all.reduce((s,c)=>s+summarize(c.d).alertCount,0);

  const cards=filtered.map(ch=>{
    const s=summarize(ch.d);
    const isActive=ch.id===state.activeId;
    return`<div class="pf-card${isActive?' pf-active':''}" data-action="openChantier" data-id="${ch.id}" style="position:relative">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text)">${esc(s.nom)}</div>
          ${s.otp?`<div style="font-size:11px;color:var(--sub)">OTP: ${esc(s.otp)}</div>`:''}
        </div>
        <span class="badge ${statusBadge(s.statut)}">${s.statut}</span>
      </div>
      <div style="font-size:13px;color:var(--sub);margin-bottom:10px">${s.chef?'Chef: '+esc(s.chef):''}${s.mo?` · MO: ${esc(s.mo)}`:''}</div>
      <div style="display:flex;gap:16px;margin-bottom:10px;font-size:13px">
        <div><div style="color:var(--sub);font-size:11px">Marché</div><strong>${s.marcheActualise>0?eurRaw(s.marcheActualise):'—'}</strong></div>
        <div><div style="color:var(--sub);font-size:11px">Marge</div><strong style="color:${s.marge<0?'var(--neg)':s.marge>0?'var(--pos)':'var(--sub)'}">${s.marcheActualise>0?pct(s.taux):'—'}</strong></div>
        <div><div style="color:var(--sub);font-size:11px">Alertes</div><strong style="color:${s.alertCount>0?'var(--warn)':'var(--sub)'}">${s.alertCount||'—'}</strong></div>
      </div>
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:3px">
          <span>Avancement</span><span>${s.avancement}%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${s.avancement}%;background:var(--acc)"></div></div>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" data-action="dupChantier" data-id="${ch.id}" title="Dupliquer">${svgIcon(ico.copy,13)} Dupliquer</button>
        <button class="btn btn-danger btn-sm" data-action="delChantier" data-id="${ch.id}" title="Supprimer">${svgIcon(ico.trash,13)} Supprimer</button>
      </div>
    </div>`;
  }).join('');

  return`
    <div class="kpi-strip" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card"><div class="kpi-label">Chantiers</div><div class="kpi-value">${total}</div></div>
      <div class="kpi-card"><div class="kpi-label">Marché cumulé</div><div class="kpi-value" style="font-size:16px">${marcheCum>0?eurRaw(marcheCum):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Marge cumulée</div><div class="kpi-value" style="font-size:16px;color:${margeCum<0?'var(--neg)':'var(--pos)'}">${marcheCum>0?eurRaw(margeCum):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Alertes totales</div><div class="kpi-value" style="color:${alertCum>0?'var(--warn)':'var(--sub)'}">${alertCum||'0'}</div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <input type="text" class="form-input" id="pf-search" placeholder="Rechercher un chantier…" value="${esc(state.pfQuery)}" style="max-width:260px">
      <div class="filter-chips">
        ${['all','Préparation','En cours','Livraison','Réceptionné'].map(s=>`
          <button class="chip${(state.pfStatut||'all')===s?' active':''}" data-action="pfFilter" data-val="${s}">${s==='all'?'Tous':s}</button>
        `).join('')}
      </div>
    </div>
    <div class="pf-grid">
      ${cards}
      <div class="pf-card-add" data-action="addChantier">
        ${svgIcon(ico.plus,24)}
        <span style="font-size:13px;font-weight:500">Ajouter un chantier</span>
      </div>
    </div>
  `;
}

// ─── Home / Launchpad ─────────────────────────────────────────────────────────
function renderHome(d,c){
  function tile(screen,icon,name,kpi,sub,color){
    return`<div class="tile" data-screen="${screen}">
      <div class="tile-icon" style="background:${color}20">${svgIcon(icon,22,`style="color:${color}"`)}</div>
      <div class="tile-name">${name}</div>
      ${kpi!==null?`<div class="tile-kpi">${kpi}</div>`:''}
      ${sub?`<div class="tile-sub">${sub}</div>`:''}
    </div>`;
  }
  const s=summarize(d);
  const hLine=c.hBudg>0?`${c.hConso||0}/${c.hBudg} h`:'';
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h1 class="page-title" style="margin:0">${esc(d.ident.nom||'Chantier')}</h1>
      <span class="badge ${statusBadge(s.statut)}">${s.statut}</span>
    </div>
    <div class="tile-group-label">Pilotage</div>
    <div class="tile-grid">
      ${tile('dashboard',ico.dash,'Tableau de bord',s.alertCount>0?s.alertCount:null,s.alertCount>0?`${s.alertCount} alerte${s.alertCount>1?'s':''}`:null,'#e76500')}
    </div>
    <div class="tile-group-label">Finances</div>
    <div class="tile-grid">
      ${tile('finance',ico.fin,'Suivi financier / RAF',c.margeBrute!==0?pct(c.tauxMarge):null,'Marge brute','#0070f2')}
      ${tile('st',ico.st,'Sous-traitants',c.stActifs||null,c.stActifs?`${c.stActifs} ST actifs`:null,'#5b738b')}
      ${tile('fournisseurs',ico.fourn,'Fournisseurs',c.fournActifs||null,c.fournActifs?`${c.fournActifs} fournisseurs`:null,'#5b738b')}
      ${tile('ts',ico.ts,'TS & Aléas',c.tsEnAttente||null,c.tsEnAttente?`${c.tsEnAttente} en attente`:null,'#e76500')}
    </div>
    <div class="tile-group-label">Exécution</div>
    <div class="tile-grid">
      ${tile('planning',ico.plan,'Planning',c.planAv>0?pct(c.planAv):null,'Avancement moyen','#107e3e')}
      ${tile('heures',ico.heure,'Heures MO',hLine||null,hLine?`Tx ${c.txH}€/h`:null,'#107e3e')}
    </div>
    <div class="tile-group-label">Qualité & Clôture</div>
    <div class="tile-grid">
      ${tile('reserves',ico.res,'Réserves',c.resOuvertes||null,c.resOuvertes?`${c.resOuvertes} ouverte${c.resOuvertes>1?'s':''}`:null,'#d20a0a')}
      ${tile('checklist',ico.check,'Check-list',`${c.clDDone+c.clRDone}/${d.checklistDemarrage.length+d.checklistReception.length}`,null,'#107e3e')}
      ${tile('cr',ico.cr,'CR Chantier',c.crCount||null,c.crCount?`${c.crCount} CR`:null,'#5b738b')}
    </div>
  `;
}
// ─── Init ─────────────────────────────────────────────────────────────────────
load();
if(state.chantiers.length===0){
  newChantier();
  state.screen='portfolio';
}else if(!state.activeId){
  state.activeId=state.chantiers[0].id;
  state.screen='portfolio';
}
render();
</script>
</body>
</html>
