<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --shell:#354a5f;--nav:#42566a;--acc:#0070f2;--pos:#107e3e;--neg:#d20a0a;--warn:#e76500;--neu:#5b738b;
  --bg:#f5f6f7;--card:#fff;--border:#e5e8ec;--text:#1d2d3e;--sub:#6a7a8a;
  --sh:0 1px 4px rgba(0,0,0,.15);--card-sh:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:'Public Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Shell bar ── */
#shell{
  height:48px;background:var(--shell);color:#fff;display:flex;align-items:center;
  gap:8px;padding:0 12px;flex-shrink:0;box-shadow:var(--sh);z-index:100;
}
#shell .logo-btn{
  width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.15);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;
  font-weight:700;font-size:13px;letter-spacing:.5px;flex-shrink:0;
}
#shell .logo-btn:hover{background:rgba(255,255,255,.25)}
#shell .pf-btn{
  display:flex;align-items:center;gap:5px;border:none;background:rgba(255,255,255,.1);
  color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;
  font-family:inherit;flex-shrink:0;
}
#shell .pf-btn:hover{background:rgba(255,255,255,.2)}
#shell .divider{width:1px;height:24px;background:rgba(255,255,255,.2);flex-shrink:0}
#shell select#chantier-sw{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:4px 8px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;max-width:220px;
}
#shell select#chantier-sw option{background:var(--shell);color:#fff}
#shell .shell-search{
  flex:1;max-width:300px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:6px;padding:5px 10px;color:#fff;font-size:13px;font-family:inherit;
}
#shell .shell-search::placeholder{color:rgba(255,255,255,.5)}
#shell .shell-search:focus{outline:none;background:rgba(255,255,255,.18)}
#shell .spacer{flex:1}
#shell .notif-btn{
  width:34px;height:34px;border-radius:50%;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);position:relative;
}
#shell .notif-btn:hover{background:rgba(255,255,255,.1)}
#shell .notif-dot{
  position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;
  background:var(--warn);border:2px solid var(--shell);
}
#shell .avatar{
  width:32px;height:32px;border-radius:50%;background:var(--acc);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;
}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Nav rail ── */
#nav-rail{
  width:60px;background:var(--nav);display:flex;flex-direction:column;
  align-items:center;padding:10px 0;gap:3px;flex-shrink:0;overflow-y:auto;
}
#nav-rail .nav-item{
  width:46px;height:46px;border-radius:10px;border:none;background:transparent;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:#cdd8e2;font-size:9px;font-family:inherit;transition:background .15s;
  text-align:center;padding:0 2px;
}
#nav-rail .nav-item:hover{background:rgba(255,255,255,.1)}
#nav-rail .nav-item.active{background:rgba(255,255,255,.16);color:#fff}
#nav-rail .nav-sep{width:32px;height:1px;background:rgba(255,255,255,.15);margin:3px 0}

/* ── Main ── */
#main{flex:1;overflow-y:auto;padding:16px}

/* ── Generic components ── */
.page-title{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}
.section-title{font-size:14px;font-weight:600;margin:20px 0 10px;color:var(--text)}
.card{background:var(--card);border-radius:10px;box-shadow:var(--card-sh);padding:16px}
.card-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--card);border-radius:10px;box-shadow:var(--card-sh);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:3px}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2f5;color:var(--sub);font-weight:600;font-size:11px;text-transform:uppercase;
   letter-spacing:.4px;padding:8px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fa}
table input,table select{
  border:1px solid transparent;border-radius:4px;padding:3px 6px;font-size:13px;
  font-family:inherit;background:transparent;width:100%;min-width:60px;
}
table input:hover,table select:hover{border-color:var(--border)}
table input:focus,table select:focus{outline:none;border-color:var(--acc);background:#fff}
td.auto{color:var(--sub);font-size:12px}
td.sticky{position:sticky;left:0;background:var(--card);z-index:1;font-weight:500}
tr:hover td.sticky{background:#f8f9fa}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:6px;padding:7px 14px;
     font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:opacity .15s}
.btn-primary{background:var(--acc);color:#fff}.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--acc);border:1px solid var(--acc)}.btn-ghost:hover{background:#e8f1fd}
.btn-danger{background:transparent;color:var(--neg);border:1px solid var(--neg)}.btn-danger:hover{background:#fde8e8}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;border-radius:6px;justify-content:center}
.add-row-btn{display:flex;align-items:center;gap:5px;margin-top:8px;color:var(--acc);
             font-size:12px;cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500}
.add-row-btn:hover{text-decoration:underline}

/* Form grid */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select,.form-textarea{
  border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;
  font-family:inherit;background:#fff;color:var(--text);width:100%;
}
.form-textarea{resize:vertical;min-height:72px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--acc)}

/* Status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#e8f5e9;color:var(--pos)}
.badge-red{background:#fde8e8;color:var(--neg)}
.badge-orange{background:#fff3e0;color:var(--warn)}
.badge-blue{background:#e8f1fd;color:var(--acc)}
.badge-grey{background:#f0f2f5;color:var(--sub)}

/* Progress bar */
.prog-bar{height:6px;background:#e5e8ec;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* Alert items */
.alert-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;
            background:#fff8f0;border-left:3px solid var(--warn);margin-bottom:6px;font-size:13px}
.alert-item svg{flex-shrink:0}

/* Tile grid */
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.tile{
  background:var(--card);border-radius:12px;box-shadow:var(--card-sh);padding:18px 16px;
  cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s,transform .1s;
  border:1px solid transparent;
}
.tile:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-1px)}
.tile .tile-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.tile .tile-name{font-size:13px;font-weight:600;color:var(--text)}
.tile .tile-kpi{font-size:20px;font-weight:700;color:var(--text)}
.tile .tile-sub{font-size:11px;color:var(--sub)}
.tile-group-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;
                   letter-spacing:.6px;margin:16px 0 6px}

/* Portfolio cards */
.pf-card{
  background:var(--card);border-radius:12px;box-shadow:var(--card-sh);padding:16px;
  cursor:pointer;border:1px solid transparent;transition:box-shadow .15s,border-color .15s;
}
.pf-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:var(--acc)}
.pf-card-add{
  background:transparent;border-radius:12px;border:2px dashed var(--border);padding:16px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--sub);min-height:120px;transition:border-color .15s;
}
.pf-card-add:hover{border-color:var(--acc);color:var(--acc)}
.pf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* Filter chips */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{
  padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;
  font-size:12px;cursor:pointer;font-family:inherit;color:var(--sub);transition:all .15s;
}
.chip.active{background:var(--acc);border-color:var(--acc);color:#fff}

/* Dot status */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

/* Param row */
.param-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.param-row .form-field{flex:1;min-width:160px}

/* Checklist */
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);flex-shrink:0}
.cl-item .cl-label{flex:1;font-size:13px}
.cl-item .cl-label.done{text-decoration:line-through;color:var(--sub)}
.cl-date{width:130px}
.cl-resp{width:160px}

/* Category breakdown */
.cat-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-label{width:140px;font-size:12px;color:var(--sub);flex-shrink:0}
.cat-bg{flex:1;height:8px;background:#e5e8ec;border-radius:4px;overflow:hidden}
.cat-fill{height:100%;border-radius:4px;background:var(--acc)}
.cat-val{font-size:12px;font-weight:600;width:50px;text-align:right;flex-shrink:0}

/* Tooltip-style note */
.note{font-size:11px;color:var(--sub);margin-top:4px}

/* Nav dot tooltip */
.nav-tip{font-size:9px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46px;text-align:center}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c5cdd6;border-radius:3px}

/* Print */
@media print{
  #shell,#nav-rail,#mobile-nav,#fab-slot,.fab,#toast-wrap{display:none!important}
  body{height:auto;overflow:visible;background:#fff}
  .layout{overflow:visible}
  #main{overflow:visible;padding:0}
  .card,.ck-card,.kpi-card,.tile,.pf-card{box-shadow:none;border:1px solid #d5dae0}
}

/* Amount input with € prefix */
.amt-cell{display:flex;align-items:center;gap:3px}
.amt-cell .sym{color:var(--sub);font-size:12px;flex-shrink:0;font-weight:500}
.amt-cell input{min-width:80px}

/* Expandable detail row */
tr.detail-row td{background:#fafbfc;padding:10px 14px}
.detail-expand-btn{background:none;border:none;cursor:pointer;color:var(--acc);padding:2px 6px;font-size:11px;border-radius:4px;white-space:nowrap}
.detail-expand-btn:hover{background:#e8f1fd}

/* Week grid */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.week-nav .week-label{font-size:14px;font-weight:600;min-width:220px;text-align:center}
.week-nav button{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-nav button:hover{background:#f0f2f5}
table.week-grid input[type=number]{width:50px;text-align:center}
table.week-grid tfoot td{font-weight:700;background:#f0f2f5;padding:8px 10px}
table.week-grid td.day-we{background:#f8f9fa}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab-btn{padding:8px 18px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab-btn:hover{color:var(--text)}

/* ════════ Field / Mobile upgrade ════════ */

/* Dark mode */
body.dark{
  --shell:#1a222c;--nav:#222c38;--bg:#12171d;--card:#1c242d;--border:#2c3742;
  --text:#e6ecf2;--sub:#93a3b3;
  --card-sh:0 2px 8px rgba(0,0,0,.4);--sh:0 1px 4px rgba(0,0,0,.5);
}
body.dark th{background:#232e3a;color:#93a3b3}
body.dark tr:hover td{background:#222c38}
body.dark td.sticky,body.dark table.week-grid tfoot td{background:#232e3a}
body.dark table input,body.dark table select,body.dark .form-input,body.dark .form-select,body.dark .form-textarea{color:var(--text);background:transparent}
body.dark .form-input,body.dark .form-select,body.dark .form-textarea{background:#232e3a}
body.dark table input:focus,body.dark table select:focus{background:#232e3a}
body.dark tr.detail-row td{background:#1a2029}
body.dark .kpi-card,body.dark .tile,body.dark .pf-card{background:var(--card)}
body.dark input[type=date],body.dark input[type=time],body.dark input[type=month]{color-scheme:dark}

/* Cockpit cards */
.cockpit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.ck-card{background:var(--card);border-radius:14px;box-shadow:var(--card-sh);padding:16px;display:flex;flex-direction:column;gap:6px}
.ck-card.big{grid-column:1/-1}
.ck-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.ck-val{font-size:26px;font-weight:800;line-height:1}
.ring{--p:0;position:relative;width:96px;height:96px;border-radius:50%;background:conic-gradient(var(--acc) calc(var(--p)*1%),var(--border) 0);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring::before{content:'';position:absolute;width:72px;height:72px;border-radius:50%;background:var(--card)}
.ring span{position:relative;font-size:20px;font-weight:800}
.ring-wrap{display:flex;align-items:center;gap:16px}
.lot-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.lot-name{width:130px;font-size:13px;font-weight:500;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lot-bar{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.lot-fill{height:100%;border-radius:5px}
.lot-pct{width:42px;text-align:right;font-size:12px;font-weight:700;flex-shrink:0}
.event-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.event-item:last-child{border-bottom:none}
.event-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--acc)}

/* Finance — compte de résultat visuel */
.fin-line{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fin-lbl{width:150px;font-size:12px;color:var(--sub);flex-shrink:0}
.fin-track{flex:1;height:24px;background:var(--border);border-radius:7px;overflow:hidden;display:flex}
.fin-seg{height:100%}
.fin-amt{width:170px;text-align:right;font-weight:700;font-size:13px;flex-shrink:0}
.fin-flow{display:flex;align-items:stretch;gap:6px;flex-wrap:wrap}
.fin-box{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.fin-box .fb-l{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.fin-box .fb-v{font-size:15px;font-weight:700}
.fin-arrow{align-self:center;color:var(--sub);font-size:16px}
.marge-gauge{height:14px;border-radius:7px;background:var(--border);position:relative;overflow:hidden;margin:6px 0}
.marge-gauge>i{position:absolute;top:0;bottom:0;left:0;border-radius:7px}
.marge-tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text);opacity:.55}
@media(max-width:760px){
  .fin-lbl{width:96px;font-size:11px}
  .fin-amt{width:auto;min-width:96px;font-size:12px}
}

/* Status / priority chips */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.st-afaire{background:#eef1f4;color:#5b738b}.st-encours{background:#e8f1fd;color:#0070f2}
.st-termine{background:#e8f5e9;color:#107e3e}.st-bloque{background:#fde8e8;color:#d20a0a}
body.dark .st-afaire{background:#2a333d;color:#a7b5c2}
.prio{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.prio-basse{background:#9aa7b4}.prio-normale{background:#0070f2}.prio-urgente{background:#d20a0a}
.prio-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.tag-basse{background:#eef1f4;color:#5b738b}.tag-normale{background:#e8f1fd;color:#0070f2}.tag-urgente{background:#fde8e8;color:#d20a0a}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.kb-col{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:8px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.kb-col-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;padding:2px 4px}
.kb-count{background:var(--card);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--sub)}
.kb-card{background:var(--card);border-radius:10px;box-shadow:var(--card-sh);padding:10px;font-size:13px;cursor:grab;border-left:3px solid var(--acc)}
.kb-card.p-urgente{border-left-color:var(--neg)}.kb-card.p-basse{border-left-color:var(--neu)}
.kb-card .kb-title{font-weight:600;margin-bottom:4px}
.kb-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--sub);font-size:11px}
.kb-move{display:flex;gap:4px;margin-top:6px}
.kb-move button{flex:1;border:1px solid var(--border);background:var(--card);border-radius:6px;padding:3px;font-size:11px;cursor:pointer;color:var(--sub)}
.kb-move button:hover{border-color:var(--acc);color:var(--acc)}

/* Quick add bar */
.quick-add{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.quick-add input.qa-main{flex:1;min-width:180px;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;background:var(--card);color:var(--text)}
.quick-add .btn{padding:11px 16px}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.photo-tile{border-radius:10px;overflow:hidden;background:var(--card);box-shadow:var(--card-sh);position:relative}
.photo-tile img{width:100%;height:110px;object-fit:cover;display:block;cursor:pointer}
.photo-tile .ph-note{padding:6px 8px;font-size:11px;color:var(--sub);border-top:1px solid var(--border)}
.photo-tile .ph-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:6px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-date-label{font-size:12px;font-weight:700;color:var(--sub);margin:14px 0 8px}
.upload-tile{border:2px dashed var(--border);border-radius:10px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--sub);cursor:pointer;font-size:12px}
.upload-tile:hover{border-color:var(--acc);color:var(--acc)}

/* Doc list */
.doc-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--card)}
.doc-ico{width:38px;height:38px;border-radius:8px;background:#e8f1fd;color:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
body.dark .doc-ico{background:#233043}
.doc-info{flex:1;min-width:0}.doc-info .doc-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-info .doc-meta{font-size:11px;color:var(--sub)}

/* Journal timeline */
.jr-entry{background:var(--card);border-radius:14px;box-shadow:var(--card-sh);padding:16px;margin-bottom:14px}
.jr-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.jr-date{font-size:15px;font-weight:700}
.jr-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.jr-field.full{grid-column:1/-1}

/* Hub de sélection (Chantiers / CRM / Devis) */
.hub-wrap{max-width:940px;margin:0 auto;padding-top:5vh}
.hub-hello{font-size:22px;font-weight:800;margin-bottom:4px}
.hub-sub{font-size:13px;color:var(--sub);margin-bottom:24px}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.hub-card{background:var(--card);border-radius:18px;padding:24px 20px;cursor:pointer;box-shadow:var(--card-sh);border:2px solid transparent;transition:border-color .15s,transform .12s,box-shadow .15s;display:flex;flex-direction:column;gap:10px}
.hub-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.hub-ic{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.hub-name{font-size:17px;font-weight:800}
.hub-desc{font-size:12px;color:var(--sub);line-height:1.45;flex:1}
.hub-stat{font-size:12px;font-weight:700;color:var(--acc)}

/* Segmented control (type d'intervention) */
.seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:none;padding:7px 14px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap}
.seg button.active{background:var(--acc);color:#fff}
.type-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 8px 8px 14px;margin-bottom:14px;flex-wrap:wrap}
.type-bar .tb-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
/* Bannière mode petite */
.petite-banner{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,var(--acc),#3d92ff);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px}
.petite-banner .pb-ic{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.petite-banner .pb-t{font-size:16px;font-weight:700}
.petite-banner .pb-s{font-size:12px;opacity:.9}
/* Tuiles de création par type */
.add-type{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:18px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:border-color .15s,background .15s}
.add-type:hover{border-color:var(--acc);background:var(--bg)}
.add-type .at-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center}

/* Floating action button */
.fab{position:fixed;right:18px;bottom:84px;width:56px;height:56px;border-radius:50%;background:var(--acc);color:#fff;border:none;box-shadow:0 4px 14px rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.94)}

/* Mobile bottom nav (hidden on desktop) */
#mobile-nav{display:none}
.icon-btn{width:34px;height:34px;border-radius:8px;border:none;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Compte / profil (bulle avatar) */
.acc-panel{position:fixed;z-index:210;top:52px;right:12px;width:300px;max-width:calc(100vw - 24px);max-height:calc(100vh - 64px);overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 10px 34px rgba(0,0,0,.28);padding:16px;color:var(--text)}
.acc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.acc-avatar{width:44px;height:44px;border-radius:50%;background:var(--acc);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acc-name{font-weight:700;font-size:15px}
.acc-mail{font-size:12px;color:var(--sub)}
.acc-sec{border-top:1px solid var(--border);margin-top:12px;padding-top:12px}
.acc-sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--sub);margin-bottom:8px}
.acc-btn{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;margin-top:8px}
.acc-note{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.4}
.icon-btn:hover{background:rgba(255,255,255,.22)}

/* ── Accessibilité : focus clavier visible ── */
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}
#shell :focus-visible,#nav-rail :focus-visible,#mobile-nav :focus-visible{outline-color:#8ec2ff}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ── En-tête de page avec actions (export…) ── */
.page-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.page-head .page-title{margin:0}

/* ── Indicateur de sauvegarde ── */
.save-ind{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;flex-shrink:0}
@media(max-width:900px){.save-ind{display:none}}

/* ── Recherche globale (shell) ── */
.search-wrap{position:relative;flex:1;max-width:340px}
.search-wrap .shell-search{width:100%;max-width:none}
.search-pop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;min-width:280px;max-height:min(430px,70vh);
  overflow-y:auto;background:var(--card);color:var(--text);border:1px solid var(--border);
  border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.28);padding:6px;z-index:230;
}
.sr-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);padding:8px 10px 3px}
.sr-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;
  padding:8px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text)}
.sr-item:hover,.sr-item:focus-visible{background:var(--bg)}
.sr-item .sr-ico{width:28px;height:28px;border-radius:8px;background:#e8f1fd;color:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
body.dark .sr-item .sr-ico{background:#233043}
.sr-item .sr-txt{flex:1;min-width:0}
.sr-item .sr-name{display:block;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-item .sr-sub{display:block;font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-empty{padding:14px;text-align:center;color:var(--sub);font-size:13px}

/* ── Centre de notifications ── */
.notif-panel{
  position:fixed;z-index:220;top:52px;right:56px;width:340px;max-width:calc(100vw - 24px);
  max-height:calc(100vh - 70px);overflow-y:auto;background:var(--card);border:1px solid var(--border);
  border-radius:14px;box-shadow:0 10px 34px rgba(0,0,0,.28);padding:12px;color:var(--text);
}
.notif-head{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;padding:2px 4px 10px}
.notif-count{background:var(--warn);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px}
.nt-item{display:flex;gap:10px;width:100%;text-align:left;border:none;background:none;padding:9px 8px;
  border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);align-items:flex-start}
.nt-item:hover,.nt-item:focus-visible{background:var(--bg)}
.nt-item .nt-ico{width:28px;height:28px;border-radius:8px;background:#fff3e0;color:var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0}
body.dark .nt-item .nt-ico{background:#3a2c1a}
.nt-item .nt-ch{font-size:11px;color:var(--sub);margin-top:1px}
.notif-empty{padding:20px 10px;text-align:center;color:var(--sub);font-size:13px}

/* ── Toasts (retours non bloquants) ── */
#toast-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{
  background:var(--shell);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;
  box-shadow:0 6px 20px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px;max-width:min(92vw,480px);
  animation:toast-in .22s ease-out;
}
.toast.err{background:var(--neg)}
.toast.ok svg{color:#7ee2a8}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(max-width:760px){#toast-wrap{bottom:88px}.notif-panel{right:12px}}

@media(max-width:760px){
  #nav-rail{display:none}
  #main{padding:12px 12px 84px}
  #shell .pf-btn span,#shell .pf-btn{font-size:12px}
  #shell select#chantier-sw{max-width:130px}
  #shell .search-wrap{display:none}
  .kanban{grid-template-columns:1fr;gap:12px}
  .jr-fields{grid-template-columns:1fr}
  .cockpit-grid{grid-template-columns:1fr 1fr}
  .page-title{font-size:16px}
  /* Bigger touch targets */
  table input,table select,.form-input,.form-select{min-height:38px;font-size:15px}
  .btn{padding:10px 16px;font-size:14px}
  .fab{display:flex}
  #mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--card);
    border-top:1px solid var(--border);z-index:95;box-shadow:0 -2px 10px rgba(0,0,0,.08);
  }
  #mobile-nav button{
    flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;color:var(--sub);font-size:10px;font-family:inherit;cursor:pointer;padding:6px 2px;
  }
  #mobile-nav button.active{color:var(--acc)}
  #mobile-nav button svg{width:22px;height:22px}
}
@media(min-width:761px){ .fab{display:none} }

// ─── State & persistence ──────────────────────────────────────────────────────
const KEY='suivi_chantier_sap_portfolio_v1';
const KEY_OLD='suivi_chantier_sap_v1';
const THEME_KEY='suivi_chantier_theme';
const ACC_KEY='suivi_chantier_account';
const CRM_KEY='suivi_chantier_crm_v1';
const DEVIS_KEY='suivi_chantier_devis_v1';
const BACKUP_KEY='suivi_chantier_last_backup';
let state={screen:'hub',chantiers:[],activeId:null,pfQuery:'',pfStatut:'all',hWeek:weekKey(new Date()),hTab:'semaine',
  taskView:'liste',theme:'light',docQuery:'',
  account:{name:'',email:'',societe:'',connected:false},accountOpen:false,
  crmData:{contacts:[]},crmQuery:'',
  devisData:{list:[]},devisId:null,
  searchQ:'',notifOpen:false,lastSaved:null};
function navWeek(dir){state.hWeek=dir==='prev'?prevWeek(state.hWeek):nextWeek(state.hWeek);render();}
function setHTab(val){state.hTab=val;render();}

function load(){
  try{
    // migrate old single-chantier data
    const old=localStorage.getItem(KEY_OLD);
    if(old&&!localStorage.getItem(KEY)){
      const d=JSON.parse(old);
      state.chantiers=[{id:'ch1',d:Object.assign(defaults(),d)}];
      state.activeId='ch1';
      save();
      localStorage.removeItem(KEY_OLD);
      return;
    }
    const raw=localStorage.getItem(KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      state.chantiers=parsed.chantiers||[];
      state.activeId=parsed.activeId||null;
      // deep-merge with defaults for any missing keys
      state.chantiers.forEach(ch=>{
        const def=defaults();
        ch.d=deepMerge(def,ch.d||{});
      });
    }
  }catch(e){console.warn('load error',e)}
  try{state.theme=localStorage.getItem(THEME_KEY)||'light'}catch(e){}
  try{const a=JSON.parse(localStorage.getItem(ACC_KEY)||'null');if(a)state.account=Object.assign(state.account,a);}catch(e){}
  try{const c=JSON.parse(localStorage.getItem(CRM_KEY)||'null');if(c&&Array.isArray(c.contacts))state.crmData=c;}catch(e){}
  try{const v=JSON.parse(localStorage.getItem(DEVIS_KEY)||'null');if(v&&Array.isArray(v.list))state.devisData=v;}catch(e){}
}
function saveAccount(){try{localStorage.setItem(ACC_KEY,JSON.stringify(state.account))}catch(e){}}
function saveCrm(){try{localStorage.setItem(CRM_KEY,JSON.stringify(state.crmData));markSaved();}catch(e){}}
function saveDevis(){try{localStorage.setItem(DEVIS_KEY,JSON.stringify(state.devisData));markSaved();}catch(e){}}

// Setter générique pour les stores globaux (CRM & Devis) — même mécanique que setD
function setGlobalD(path,value){
  const parts=path.split('.');
  const root=parts.shift(); // 'crm' | 'devis'
  let obj=root==='crm'?state.crmData:state.devisData;
  for(let i=0;i<parts.length-1;i++){
    const k=parts[i];const nk=parts[i+1];
    if(obj[k]===undefined||obj[k]===null)obj[k]=/^\d+$/.test(nk)?[]:{};
    obj=obj[k];
  }
  obj[parts[parts.length-1]]=value;
  if(root==='crm')saveCrm();else saveDevis();
}
function accountInitials(){

// ─── Toasts (retours non bloquants) ──────────────────────────────────────────
function toast(msg,type='ok',ms=2600){
  const wrap=document.getElementById('toast-wrap');if(!wrap)return;
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=svgIcon(type==='err'?ico.warn:ico.checkmark,15)+'<span></span>';
  t.querySelector('span').textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .25s';setTimeout(()=>t.remove(),260);},ms);
}

// ─── Export CSV (compatible Excel FR : BOM UTF-8, séparateur « ; ») ──────────
function downloadCSV(filename,rows){
  const csv='\ufeff'+rows.map(r=>r.map(v=>{v=String(v??'');return/[";\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Export CSV téléchargé : '+filename);
}
const slugify=s=>(String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''))||'export';
function csvBtn(kind){return`<button class="btn btn-ghost btn-sm" data-action="exportCsv" data-kind="${kind}" title="Exporter en CSV (Excel)">${svgIcon(ico.download,13)} Export CSV</button>`;}
function exportCsvKind(kind){
  const dec=x=>String(x??'').replace('.',',');
  if(kind==='crm'){
    downloadCSV('contacts-crm-'+todayISO()+'.csv',[
      ['Nom','Société','Type','Statut','Téléphone','E-mail','Dernier contact','Notes'],
      ...state.crmData.contacts.filter(c=>c.nom).map(c=>[c.nom,c.societe,c.type,c.statut,c.tel,c.email,fmtDateFR(c.dernierContact),c.notes])
    ]);return;
  }
  if(kind==='devis'){
    downloadCSV('devis-'+todayISO()+'.csv',[
      ['N°','Client','Date','Statut','Total HT','TVA','Total TTC'],
      ...state.devisData.list.map(v=>{const t=devisTotals(v);return[v.num,v.client,fmtDateFR(v.date),v.statut,dec(t.ht.toFixed(2)),dec(t.tva.toFixed(2)),dec(t.ttc.toFixed(2))];})
    ]);return;
  }
  const ch=getActive();
  if(!ch){toast('Aucun chantier actif.','err');return;}
  const d=ch.d;
  const fname=t=>`${t}-${slugify(d.ident.nom||'chantier')}-${todayISO()}.csv`;
  switch(kind){
    case'planning':
      downloadCSV(fname('planning'),[
        ['Tâche','Responsable','Lot','Durée (j)','Début','Fin','Avancement %','Statut','Priorité','Commentaire'],
        ...d.planning.filter(t=>t.tache).map(t=>[t.tache,t.responsable,t.lot,dec(t.duree),fmtDateFR(t.debut),fmtDateFR(t.fin),dec(t.avancement),t.statut,t.priorite,t.commentaire]),
        [],
        ['Jalon','Date prévisionnelle','Date réelle','Statut'],
        ...d.jalons.map(j=>[j.nom,fmtDateFR(j.datePrev),fmtDateFR(j.dateReel),j.statut])
      ]);break;
    case'heures':{
      const wk=state.hWeek||weekKey(new Date());
      const days=weekDays(wk);
      const wd=(d.heuresHebdo||{})[wk]||{};
      downloadCSV(fname('heures-'+wk),[
        ['Semaine '+isoWeekNum(wk),fmtWeekRange(wk)],
        ['Compagnon','Catégorie',...days.map(x=>x.label+' '+x.num),'Total semaine','Cumul chantier'],
        ...d.compagnons.map(comp=>{
          const cd=wd[comp.id]||{};
          const tot=days.reduce((s,day)=>s+n(cd[day.key]),0);
          let cum=0;Object.values(d.heuresHebdo||{}).forEach(w2=>{const c2=w2[comp.id];if(c2)cum+=Object.values(c2).reduce((s,v)=>s+n(v),0);});
          return[`${comp.prenom||''} ${comp.nom||''}`.trim(),comp.categorie,...days.map(day=>dec(cd[day.key]||'')),dec(tot),dec(cum)];
        })
      ]);break;}
    case'reserves':
      downloadCSV(fname('reserves'),[
        ['N°','Type','Lot','Description','Entreprise','Date constat','Levée prévue','Impact (j)','Statut','Levée réelle','Note'],
        ...d.reserves.filter(r=>r.description).map(r=>[r.num,r.type,r.lot,r.description,r.entreprise,fmtDateFR(r.dateConstat),fmtDateFR(r.dateLeveePrev),dec(r.impact),r.statut,fmtDateFR(r.dateLeveeReel),r.detailNote])
      ]);break;
    case'ts':
      downloadCSV(fname('ts-aleas'),[
        ['N°','Date','Nature','Demandeur','Montant estimé','Montant accordé','Statut','Impact planning','Impact budget','N° avenant','Détail'],
        ...d.ts.filter(t=>t.nature).map(t=>[t.num,fmtDateFR(t.date),t.nature,t.demandeur,dec(t.mtEstime),dec(t.mtAccorde),t.statut,t.impactPlanning,t.impactBudget,t.numAvenant,t.detail])
      ]);break;
    case'st':
      downloadCSV(fname('sous-traitants'),[
        ['Entreprise','Lot','Catégorie','Marché HT','DC4','Agrément','Montant situation','RG','Statut','Descriptif'],
        ...d.st.filter(s=>s.entreprise).map(s=>[s.entreprise,s.lot,s.categorie,dec(s.montantHT),s.dc4,s.agrement,dec(s.mtSit),s.rg,s.statut,s.obs])
      ]);break;
    case'fournisseurs':
      downloadCSV(fname('fournisseurs'),[
        ['Fournisseur','Désignation','Catégorie','N° BC','Montant HT','Livraison prévue','Reçu','Montant facturé','Statut'],
        ...d.fournisseurs.filter(f=>f.fournisseur).map(f=>[f.fournisseur,f.designation,f.categorie,f.numBC,dec(f.montant),fmtDateFR(f.livraison),f.recu,dec(f.mtFacture),f.statut])
      ]);break;
    case'situations':{
      const c=computeAll(d);
      downloadCSV(fname('situations'),[
        ['N°','Période','Date envoi','Montant HT','Cumul HT','Date paiement','Délai (j)','Statut','Retard (j)'],
        ...c.situations.filter(s=>s.montantHT||s.dateEnvoi).map(s=>[s.num,s.periode,fmtDateFR(s.dateEnvoi),dec(s.montantHT),dec(s.cumul),fmtDateFR(s.datePaiement),dec(s.delai),s.statut,s.retard>0?dec(s.retard):''])
      ]);break;}
    default:toast('Export inconnu.','err');
  }
}

// ─── Centre de notifications (agrégé sur tous les chantiers) ─────────────────
function buildNotifications(){
  const items=[];
  state.chantiers.forEach(ch=>{
    try{
      if(ch.d.type==='petite'){
        const s=summarize(ch.d);
        if(s.marge<0)items.push({chId:ch.id,ch:s.nom,msg:'Marge négative : '+eurRaw(s.marge)});
        return;
      }
      computeAll(ch.d).alerts.forEach(a=>items.push({chId:ch.id,ch:ch.d.ident.nom||'Sans nom',msg:a.msg}));
    }catch(e){}
  });
  try{
    const last=parseInt(localStorage.getItem(BACKUP_KEY)||'0');
    const hasData=state.chantiers.length>1||state.chantiers.some(c=>c.d.ident.nom)||state.crmData.contacts.length>0||state.devisData.list.length>0;
    if(hasData&&(!last||Date.now()-last>14*86400000)){
      items.push({backup:true,ch:'Sauvegarde des données',msg:last?'Dernier export il y a plus de 14 jours — exportez une sauvegarde (.json).':'Aucune sauvegarde exportée — pensez à exporter vos données (.json).'});
    }
  }catch(e){}
  return items;
}
function notifPanel(){
  const items=buildNotifications();
  return`<div class="notif-panel" role="dialog" aria-label="Notifications">
    <div class="notif-head"><span>Notifications</span>${items.length?`<span class="notif-count">${items.length}</span>`:''}</div>

}

// ─── Recherche globale (chantiers, tâches, réserves, docs, CRM, devis…) ──────
const SEARCH_CAT_ORDER=['Chantiers','Tâches','Réserves','Documents','Journal','Sous-traitants','Fournisseurs','Contacts CRM','Devis'];
function globalSearchResults(q){
  q=q.trim().toLowerCase();
  if(q.length<2)return[];
  const out=[];
  const M=s=>String(s||'').toLowerCase().includes(q);
  const push=(cat,icon,name,sub,go)=>out.push({cat,icon,name,sub,go});
  state.chantiers.forEach(ch=>{
    const d=ch.d,nom=d.ident.nom||'Sans nom';
    if(M(nom)||M(d.ident.otp)||M(d.ident.adresse)||M(d.ident.chef))push('Chantiers',ico.brief,nom,d.ident.adresse||d.ident.otp||'',{ch:ch.id,screen:'home'});
    d.planning.forEach(t=>{if(t.tache&&(M(t.tache)||M(t.lot)||M(t.responsable)))push('Tâches',ico.kanban,t.tache,nom+(t.statut&&t.statut!=='—'?' · '+t.statut:''),{ch:ch.id,screen:'tasks'});});
    d.reserves.forEach(r=>{if(r.description&&(M(r.description)||M(r.lot)||M(r.entreprise)))push('Réserves',ico.res,r.description,nom+' · '+r.statut,{ch:ch.id,screen:'reserves'});});
    (d.documents||[]).forEach(doc=>{if(M(doc.name))push('Documents',ico.folder,doc.name,nom,{ch:ch.id,screen:'documents'});});
    (d.journal||[]).forEach(e=>{if(M(e.travaux)||M(e.problemes)||M(e.decisions))push('Journal',ico.journal,(e.travaux||e.problemes||'Entrée de journal').slice(0,60),nom+' · '+fmtDateFR(e.date),{ch:ch.id,screen:'journal'});});
    d.st.forEach(s=>{if(s.entreprise&&M(s.entreprise))push('Sous-traitants',ico.st,s.entreprise,nom+(s.lot?' · '+s.lot:''),{ch:ch.id,screen:'st'});});
    d.fournisseurs.forEach(f=>{if(f.fournisseur&&(M(f.fournisseur)||M(f.designation)))push('Fournisseurs',ico.fourn,f.fournisseur,nom+(f.designation?' · '+f.designation:''),{ch:ch.id,screen:'fournisseurs'});});
  });
  state.crmData.contacts.forEach(ct=>{if(ct.nom&&(M(ct.nom)||M(ct.societe)||M(ct.email)))push('Contacts CRM',ico.crm,ct.nom,ct.societe||ct.email||'',{screen:'crm'});});
  state.devisData.list.forEach(dv=>{if(M(dv.num)||M(dv.client))push('Devis',ico.devis,(dv.num||'Devis')+(dv.client?' — '+dv.client:''),dv.statut||'',{screen:'devis',devis:dv.id});});
  const byCat={};const limited=[];
  for(const r of out){byCat[r.cat]=(byCat[r.cat]||0)+1;if(byCat[r.cat]<=5)limited.push(r);if(limited.length>=24)break;}
  limited.sort((a,b)=>SEARCH_CAT_ORDER.indexOf(a.cat)-SEARCH_CAT_ORDER.indexOf(b.cat));
  return limited;
}
let searchResultsCache=[];
function renderSearchPop(){
  const pop=document.getElementById('search-pop');if(!pop)return;
  const q=state.searchQ||'';
  if(q.trim().length<2){pop.style.display='none';pop.innerHTML='';return;}
  const res=searchResultsCache=globalSearchResults(q);
  pop.style.display='block';
  if(!res.length){pop.innerHTML='<div class="sr-empty">Aucun résultat pour « '+esc(q)+' »</div>';return;}
  let html='',lastCat='';
  res.forEach((r,i)=>{
    if(r.cat!==lastCat){html+=`<div class="sr-cat">${r.cat}</div>`;lastCat=r.cat;}
    html+=`<button class="sr-item" data-action="searchGo" data-sr="${i}">
      <span class="sr-ico">${svgIcon(r.icon,14)}</span>
      <span class="sr-txt"><span class="sr-name">${esc(r.name)}</span>${r.sub?`<span class="sr-sub">${esc(r.sub)}</span>`:''}</span>
    </button>`;
  });
  pop.innerHTML=html;
}
function searchGo(i){
  const r=searchResultsCache[i];if(!r)return;
  state.searchQ='';
  if(r.go.ch)state.activeId=r.go.ch;
  if(r.go.devis)state.devisId=r.go.devis;
  state.screen=r.go.screen;
  render();
}

function fmtDateFR(iso){if(!iso)return'';const p=iso.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso;}
function fmtDateLong(iso){
  if(!iso)return'';
  const J=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const d=new Date(iso+'T12:00:00');if(isNaN(d))return iso;
  return`${J[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

function importBackupData(parsed){
  if(!parsed||!Array.isArray(parsed.chantiers)){alert('Fichier de sauvegarde invalide.');return;}

  state.chantiers=parsed.chantiers.map(ch=>({id:ch.id||('ch'+Date.now()+Math.random().toString(36).slice(2,5)),d:deepMerge(defaults(),ch.d||{})}));
  state.activeId=parsed.activeId&&state.chantiers.some(c=>c.id===parsed.activeId)?parsed.activeId:(state.chantiers[0]?.id||null);
  if(parsed.account){state.account=Object.assign({name:'',email:'',societe:'',connected:false},parsed.account);saveAccount();}
  if(parsed.crm&&Array.isArray(parsed.crm.contacts)){state.crmData=parsed.crm;saveCrm();}
  if(parsed.devis&&Array.isArray(parsed.devis.list)){state.devisData=parsed.devis;saveDevis();}
  save();state.accountOpen=false;state.screen='hub';render();
  alert('Sauvegarde restaurée : '+state.chantiers.length+' chantier(s).');
}

// Compresse une image (fichier) en dataURL JPEG (max ~1280px) pour tenir dans localStorage
function fileToCompressedDataURL(file,maxDim=1280,quality=.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        try{resolve(cv.toDataURL('image/jpeg',quality));}catch(err){resolve(reader.result);}
      };
      img.onerror=reject;img.src=reader.result;
    };
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}

// Résumé automatique d'une journée de journal
function aiDaySummary(entry){
  const parts=[];
  if(entry.travaux&&entry.travaux.trim())parts.push('Travaux : '+entry.travaux.trim().replace(/\s+/g,' '));
  if(entry.presents&&entry.presents.trim())parts.push('Présents : '+entry.presents.trim());
  if(entry.problemes&&entry.problemes.trim())parts.push('Points de vigilance : '+entry.problemes.trim());
  if(entry.decisions&&entry.decisions.trim())parts.push('Décisions : '+entry.decisions.trim());
  if((entry.photos||[]).length)parts.push((entry.photos.length)+' photo(s) jointe(s)');
  if(!parts.length)return "Journée du "+fmtDateFR(entry.date)+" : aucune information saisie.";
  return "Le "+fmtDateFR(entry.date)+(entry.meteo?(' ('+entry.meteo+')'):'')+". "+parts.join('. ')+'.';
}
// Suggestions d'actions à partir de l'état du chantier
function aiSuggestions(d){
  const today=new Date();const out=[];
  d.planning.forEach(t=>{
    if(t.tache&&t.fin&&t.statut!=='Terminé'&&t.statut!=='terminé'&&new Date(t.fin)<today)
      out.push(`Relancer « ${t.tache} » — échéance dépassée (${fmtDateFR(t.fin)})`);
    if(t.tache&&(t.statut==='Bloqué'||t.statut==='bloqué'))
      out.push(`Débloquer « ${t.tache} »${t.responsable?' avec '+t.responsable:''}`);
  });
  d.st.forEach(s=>{if(s.entreprise&&s.dc4==='Non')out.push(`Obtenir le DC4 de ${s.entreprise}`);});
  d.reserves.forEach(r=>{if(r.description&&r.statut==='Ouverte')out.push(`Lever la réserve : ${r.description}`);});
  const dernier=(d.journal||[])[0];
  if(!dernier||dernier.date!==todayISO())out.push("Renseigner le journal de chantier du jour");
  return out.slice(0,6);
}

function deepMerge(base,over){
  if(Array.isArray(base)&&Array.isArray(over)){
    // merge by index, keeping over length if longer
    const len=Math.max(base.length,over.length);
    return Array.from({length:len},(_,i)=>{
      if(i>=over.length)return base[i];
      if(i>=base.length)return over[i];
      if(typeof base[i]==='object'&&base[i]!==null&&typeof over[i]==='object'&&over[i]!==null)
        return deepMerge(base[i],over[i]);
      return over[i]??base[i];
    });
  }
  if(typeof base==='object'&&base!==null&&typeof over==='object'&&over!==null){
    const r={...base};
    for(const k of Object.keys(over)){
      if(k in base&&typeof base[k]==='object'&&base[k]!==null&&typeof over[k]==='object'&&over[k]!==null)
        r[k]=deepMerge(base[k],over[k]);
      else r[k]=over[k]??base[k];
    }
    return r;
  }
  return over??base;
}

function getActive(){return state.chantiers.find(c=>c.id===state.activeId)||null}

function newChantier(type){
  const id='ch'+Date.now();
  const ch={id,d:defaults()};
  if(type)ch.d.type=type;
  state.chantiers.push(ch);
  state.activeId=id;
  save();
  return ch;
}

function dupChantier(id){
  const src=state.chantiers.find(c=>c.id===id);
  if(!src)return;
  const newId='ch'+Date.now();
  state.chantiers.push({id:newId,d:JSON.parse(JSON.stringify(src.d))});
  save();
  render();
}

function delChantier(id){
  state.chantiers=state.chantiers.filter(c=>c.id!==id);
  if(state.activeId===id)state.activeId=state.chantiers[0]?.id||null;
  save();
  render();
}

// ─── Deep set ────────────────────────────────────────────────────────────────
function setD(path,value){
  const ch=getActive();
  if(!ch)return;
  // Special case for heuresHebdo: path = "heuresHebdo.YYYY-WNN.compId.day"
  if(path.startsWith('heuresHebdo.')){
    const rest=path.slice('heuresHebdo.'.length);
    // week key contains '-' not '.', compId may contain letters/digits
    // format: YYYY-WNN.compId.day
    const m=rest.match(/^(\d{4}-W\d{2})\.([^.]+)\.([^.]+)$/);
    if(m){
      const[,wk,cId,day]=m;
      if(!ch.d.heuresHebdo)ch.d.heuresHebdo={};
      if(!ch.d.heuresHebdo[wk])ch.d.heuresHebdo[wk]={};
      if(!ch.d.heuresHebdo[wk][cId])ch.d.heuresHebdo[wk][cId]={};
      ch.d.heuresHebdo[wk][cId][day]=value===''?0:n(value);
      save();return;
    }
  }
  const parts=path.split('.');
  let obj=ch.d;
  for(let i=0;i<parts.length-1;i++){
    const k=parts[i];
    const nk=parts[i+1];
    if(obj[k]===undefined||obj[k]===null)obj[k]=/^\d+$/.test(nk)?[]:{};
    obj=obj[k];
  }
  const last=parts[parts.length-1];
  obj[last]=value;
  save();
}

function addRow(listPath){
  const ch=getActive();if(!ch)return;
  const parts=listPath.split('.');
  let obj=ch.d;
  for(const k of parts)obj=obj[k];
  const def=defaults();
  let defArr=def;
  for(const k of parts)defArr=defArr[k];
  if(listPath==='compagnons'){
    obj.push({id:'c'+Date.now(),nom:'',prenom:'',categorie:'Compagnon'});
  }else{
    obj.push(JSON.parse(JSON.stringify(defArr[0]||{})));
    if('num' in obj[obj.length-1])obj[obj.length-1].num=obj.length;
  }
  save();
  render();
}

function delRow(listPath,idx){
  const ch=getActive();if(!ch)return;
  const parts=listPath.split('.');
  let obj=ch.d;
  for(const k of parts)obj=obj[k];
  obj.splice(idx,1);
  // renumber
  obj.forEach((r,i)=>{if('num' in r)r.num=i+1});
  save();
  render();
}

function statusBadge(s){
  if(s==='Préparation')return'badge-blue';
  if(s==='En cours')return'badge-green';
  if(s==='Livraison')return'badge-orange';
  if(s==='Réceptionné')return'badge-grey';
  return'badge-grey';
}

function summarize(d){
  const av=n(d.ident.avancementLot);
  const hasReception=d.ident.reception&&d.ident.reception.length>0;
  let statut='Préparation',statutColor='#0070f2';
  let statutBg='#e8f1fd';
  if(hasReception){statut='Réceptionné';statutColor='#5b738b';statutBg='#f0f2f5';}
  else if(av>=90){statut='Livraison';statutColor='#e76500';statutBg='#fff3e0';}
  else if(av>0||d.ident.dateOS){statut='En cours';statutColor='#107e3e';statutBg='#e8f5e9';}

  // Petite intervention : le marché et la marge viennent de la fiche 1 page
  // (montant vendu − déboursé fournitures + matériel + main d'œuvre)
  if(d.type==='petite'){
    const p=d.petite||{};
    const lt=x=>n(x.qte)*n(x.pu);
    const totF=(p.fournitures||[]).reduce((s,x)=>s+lt(x),0);
    const totM=(p.materiel||[]).reduce((s,x)=>s+lt(x),0);
    const totMO=(p.mainoeuvre||[]).reduce((s,x)=>s+n(x.heures)*n(x.taux),0);
    const recette=n(p.montant);
    const debourse=totF+totM+totMO;
    const marge=recette-debourse;
    const taux=recette>0?marge/recette*100:0;
    return{nom:d.ident.nom||'Sans nom',otp:d.ident.otp,mo:p.client||d.ident.mo,chef:d.ident.chef,
      statut,statutColor,statutBg,marcheActualise:recette,marge,taux,avancement:av,
      alertCount:marge<0?1:0,retards:0};
  }

  const marcheInitial=n(d.finance.marcheInitial)||n(d.contract.montantHT);
  const avenantsSomme=d.avenants.reduce((s,a)=>s+n(a.montant),0);
  const avenantsSignes=n(d.finance.avenantsSignes)||avenantsSomme;
  const marcheActualise=marcheInitial+avenantsSignes;
  // Réel engagé = somme du réel engagé des tâches du planning (postes analytiques)
  const planReel=d.planning.reduce((s,t)=>s+n(t.reelEngage),0);
  const planBudget=d.planning.reduce((s,t)=>s+n(t.budgetPrevu),0);
  const reelEngage=n(d.finance.reelEngage)||planReel;
  const budgetCR=n(d.finance.budgetCR)||planBudget||marcheInitial;
  const marge=budgetCR-reelEngage;
  const taux=budgetCR>0?marge/budgetCR*100:0;

  // alerts
  let alertCount=0;
  if(marge<0)alertCount++;
  const hBudg=n(d.heures.budgetTotal);
  const hConso=n(d.heures.consomme);
  const seuilH=n(d.heures.seuilAlerte)||90;
  if(hBudg>0&&hConso/hBudg*100>seuilH)alertCount++;
  else if(!hBudg&&hConso>0)alertCount++;
  // payment retards
  const today=new Date();
  d.situations.forEach(s=>{
    if(s.dateEnvoi&&!s.datePaiement&&s.statut!=='Payé'){
      const sent=new Date(s.dateEnvoi);
      const delai=n(s.delai)||30;
      const due=new Date(sent.getTime()+delai*86400000);
      if(today>due)alertCount++;
    }
  });
  const dc4Manquants=d.st.filter(s=>s.entreprise&&s.dc4==='Non').length;
  if(dc4Manquants>0)alertCount++;
  const tsEnAttente=d.ts.filter(t=>t.nature&&t.statut==='En attente').length;
  if(tsEnAttente>0)alertCount++;
  const resOuvertes=d.reserves.filter(r=>r.description&&r.statut==='Ouverte').length;
  if(resOuvertes>0)alertCount++;

  // planning retards
  let retards=0;
  d.planning.forEach(t=>{
    if(t.fin&&t.statut!=='Terminé'){
      if(new Date(t.fin)<today)retards++;
    }
  });

  // Auto avancement from planning
  const planTaches=d.planning.filter(t=>t.tache);
  const avAuto=planTaches.length>0?planTaches.reduce((s,t)=>s+n(t.avancement),0)/planTaches.length:av;

  return{nom:d.ident.nom||'Sans nom',otp:d.ident.otp,mo:d.ident.mo,chef:d.ident.chef,
    statut,statutColor,statutBg,marcheActualise,marge,taux,avancement:avAuto,alertCount,retards};
}

function computeAll(d){
  const today=new Date();

  // Heures — total from weekly grid (heuresHebdo) + manual override
  const txH=n(d.heures.txHoraire)||37.3;
  const hBudg=n(d.heures.budgetTotal);
  // Sum all hours from weekly grid
  let hConsoHebdo=0;
  const catMap={};
  Object.values(d.heuresHebdo||{}).forEach(weekData=>{
    Object.entries(weekData).forEach(([cId,days])=>{
      const comp=d.compagnons.find(c=>c.id===cId);
      const cat=comp?comp.categorie:'Compagnon';
      const h=Object.values(days).reduce((s,v)=>s+n(v),0);
      hConsoHebdo+=h;
      catMap[cat]=(catMap[cat]||0)+h;
    });
  });
  // If no weekly data, fall back to legacy heuresEntries
  d.heuresEntries.forEach(e=>{
    if(!e.heures)return;
    if(hConsoHebdo===0){catMap[e.categorie]=(catMap[e.categorie]||0)+n(e.heures);}
  });
  const hConso=hConsoHebdo>0?hConsoHebdo:n(d.heures.consomme);
  const hPct=hBudg>0?Math.min(hConso/hBudg*100,100):0;
  const hSolde=hBudg-hConso;
  const hSeuil=n(d.heures.seuilAlerte)||90;
  const hColor=hPct>=100?'#d20a0a':hPct>=hSeuil?'#e76500':'#107e3e';

  // ST
  const stReel=cat=>d.st.filter(s=>s.categorie===cat).reduce((s,x)=>s+n(x.mtSit),0);
  const stEng=cat=>d.st.filter(s=>s.categorie===cat).reduce((s,x)=>s+n(x.montantHT),0);
  const stTotal=d.st.reduce((s,x)=>s+n(x.montantHT),0);
  const stSitTotal=d.st.reduce((s,x)=>s+n(x.mtSit),0);
  const stActifs=d.st.filter(s=>s.entreprise).length;
  const stDC4=d.st.filter(s=>s.entreprise&&s.dc4==='Non').length;

  // Fournisseurs
  const fReel=cat=>d.fournisseurs.filter(f=>f.categorie===cat).reduce((s,x)=>s+n(x.mtFacture),0);
  const fEng=cat=>d.fournisseurs.filter(f=>f.categorie===cat).reduce((s,x)=>s+n(x.montant),0);
  const fReelM=cat=>d.fournisseurs.filter(f=>f.categorie===cat).reduce((s,x)=>s+n(x.mtFacture),0);
  const fTotal=d.fournisseurs.reduce((s,x)=>s+n(x.montant),0);
  const fournActifs=d.fournisseurs.filter(f=>f.fournisseur).length;

  // ── Avancement des tâches (planning) — pour cockpit & planning ─────────────
  const posteTasks=d.planning.map((t,i)=>{
    const av=n(t.avancement);
    return{i,tache:t.tache,responsable:t.responsable,statut:t.statut,debut:t.debut,fin:t.fin,av};
  });

  // ── Dépenses engagées AUTOMATIQUES (aucune saisie manuelle de budget) ──────
  //    Réel engagé = Main d'œuvre (heures × taux) + Sous-traitants + Fournisseurs
  const depenseMO=Math.round(hConso*txH);
  const depenseST=d.st.reduce((s,x)=>s+n(x.montantHT),0);
  const depenseFourn=fTotal;
  const reelEngageAuto=depenseMO+depenseST+depenseFourn;

  // Finance — suivi ENTIÈREMENT AUTOMATISÉ (réel calculé depuis les rubriques)
  const marcheInitial=n(d.finance.marcheInitial)||n(d.contract.montantHT);
  const avenantsSomme=d.avenants.reduce((s,a)=>s+n(a.montant),0);
  const avenantsSignes=n(d.finance.avenantsSignes)||avenantsSomme;
  const marcheActualise=marcheInitial+avenantsSignes;
  const budgetCR=n(d.finance.budgetCR)||marcheInitial;
  const reelEngage=n(d.finance.reelEngage)||reelEngageAuto;
  const resteAEngager=n(d.finance.resteAEngager);
  const eac=reelEngage+(resteAEngager>0?resteAEngager:Math.max(0,budgetCR-reelEngage));
  const margeBrute=marcheActualise-eac;
  const tauxMarge=marcheActualise>0?margeBrute/marcheActualise*100:0;

  // Situations
  const totalFacture=d.situations.reduce((s,sit)=>s+n(sit.montantHT),0);
  let totalEncaisse=0;
  const situations=d.situations.map((sit,i)=>{
    const prev=d.situations.slice(0,i).reduce((s,x)=>s+n(x.montantHT),0);
    const cumul=prev+n(sit.montantHT);
    let retard=0;
    if(sit.dateEnvoi&&!sit.datePaiement&&sit.statut!=='Payé'){
      const sent=new Date(sit.dateEnvoi);
      const delai=n(sit.delai)||30;
      const due=new Date(sent.getTime()+delai*86400000);
      if(today>due)retard=Math.floor((today-due)/86400000);
    }
    if(sit.datePaiement)totalEncaisse+=n(sit.montantHT);
    return{...sit,cumul,retard};
  });

  // RAF
  const moConsoH=hConso;
  const moRate=txH;
  const rafDefs=[
    {id:'stMoyen',label:'ST Moyen',src:'Sous-traitants',reel:stReel('ST Moyen'),eng:stEng('ST Moyen'),reelM:0},
    {id:'stComp',label:'ST Compétence',src:'Sous-traitants',reel:stReel('ST Compétence'),eng:stEng('ST Compétence'),reelM:0},
    {id:'mo',label:"Main d'œuvre",src:`Heures · ${hConso||'N'} h × ${txH} €`,reel:moConsoH*moRate,eng:0,reelM:0},
    {id:'fournitures',label:'Fournitures',src:'Fournisseurs',reel:fReel('Fournitures'),eng:fEng('Fournitures'),reelM:fReelM('Fournitures')},
    {id:'materiel',label:'Matériel',src:'Fournisseurs',reel:fReel('Matériel'),eng:fEng('Matériel'),reelM:fReelM('Matériel')},
    {id:'etudes',label:'Études techniques',src:'Saisie manuelle',manual:true},
    {id:'autres',label:'Autres dépenses',src:'Saisie manuelle',manual:true}
  ];

  const MOIS_FR=['Janv','Févr','Mars','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
  let rafCnt=4;
  if(d.ident.fin&&d.raf.moisRef){
    try{
      const ref=new Date(d.raf.moisRef+'-01');
      const fin=new Date(d.ident.fin);
      const diff=Math.round((fin-ref)/(30*86400000));
      rafCnt=Math.max(1,Math.min(6,diff));
    }catch(e){}
  }
  const rafMoisRef=d.raf.moisRef||'2026-01';
  const rafMonths=Array.from({length:rafCnt},(_,i)=>{
    try{
      const [yr,mo]=rafMoisRef.split('-').map(Number);
      const d2=new Date(yr,mo-1+i+1,1);
      return MOIS_FR[d2.getMonth()]+' '+d2.getFullYear();
    }catch{return'M+'+(i+1)}
  });

  // Reserves
  const resTotal=d.reserves.filter(r=>r.description).length;
  const resOuvertes=d.reserves.filter(r=>r.description&&r.statut==='Ouverte').length;
  const resLevees=d.reserves.filter(r=>r.description&&r.statut==='Levée').length;

  // Checklist
  const clD=d.checklistDemarrage;
  const clR=d.checklistReception;
  const clDDone=clD.filter(x=>x.done).length;
  const clRDone=clR.filter(x=>x.done).length;

  // TS
  const tsEnAttente=d.ts.filter(t=>t.nature&&t.statut==='En attente').length;
  const tsEstime=d.ts.reduce((s,t)=>s+n(t.mtEstime),0);
  const tsAccorde=d.ts.reduce((s,t)=>s+n(t.mtAccorde),0);

  // CR
  const crCount=d.crHistorique.filter(c=>c.type).length;

  // Planning — avancement auto from tasks with tache filled
  const planTachesAll=d.planning.filter(t=>t.tache);
  const planAv=planTachesAll.length?planTachesAll.reduce((s,t)=>s+n(t.avancement),0)/planTachesAll.length:n(d.ident.avancementLot);

  // Alerts
  const alerts=[];
  if(margeBrute<0&&budgetCR>0)alerts.push({msg:`Marge négative : ${eurRaw(margeBrute)}`,icon:ico.warn});
  if(hBudg>0&&hPct>=hSeuil)alerts.push({msg:`Heures MO à ${hPct.toFixed(0)}% du budget (seuil ${hSeuil}%)`,icon:ico.warn});
  const retardPmt=situations.filter(s=>s.retard>0).length;
  if(retardPmt>0)alerts.push({msg:`${retardPmt} situation(s) en retard de paiement`,icon:ico.warn});
  if(stDC4>0)alerts.push({msg:`DC4 manquant pour ${stDC4} sous-traitant(s)`,icon:ico.warn});
  if(tsEnAttente>0)alerts.push({msg:`${tsEnAttente} TS/Aléa(s) en attente de décision`,icon:ico.warn});
  if(resOuvertes>0)alerts.push({msg:`${resOuvertes} réserve(s) OPR/OPL ouverte(s)`,icon:ico.warn});

  return{
    marcheInitial,avenantsSignes,marcheActualise,budgetCR,reelEngage,resteAEngager,eac,
    margeBrute,tauxMarge,totalFacture,totalEncaisse,situations,
    hBudg,hConso,txH,hPct,hSolde,hSeuil,hColor,catMap,
    stTotal,stSitTotal,stActifs,stDC4,
    fTotal,fournActifs,
    posteTasks,depenseMO,depenseST,depenseFourn,reelEngageAuto,
    rafDefs,rafMonths,rafCnt,
    resTotal,resOuvertes,resLevees,
    clDDone,clRDone,
    tsEnAttente,tsEstime,tsAccorde,
    crCount,planAv,alerts
  };
}

// ─── Event delegation ────────────────────────────────────────────────────────
document.addEventListener('change',e=>{
  const t=e.target;
  const name=t.name;
  if(!name)return;
  const val=t.type==='checkbox'?t.checked:t.value;
  // Champs des stores globaux (CRM / Devis) — indépendants du chantier actif
  if(name.startsWith('crm.')||name.startsWith('devis.')){
    setGlobalD(name,val);render();return;
  }
  if(!getActive())return;
  setD(name,val);
  // TS: si statut = Refusé → montant accordé = 0
  if(name.match(/^ts\.\d+\.statut$/)&&val==='Refusé'){
    const idx=parseInt(name.split('.')[1]);
    setD(`ts.${idx}.mtAccorde`,'0');
  }
  // Réserves: auto-calc impact depuis dates
  if(name.match(/^reserves\.\d+\.(dateConstat|dateLeveePrev)$/)){
    const idx=parseInt(name.split('.')[1]);
    const ch=getActive();
    if(ch){
      const r=ch.d.reserves[idx];
      if(r.dateConstat&&r.dateLeveePrev){
        const diff=Math.round((new Date(r.dateLeveePrev)-new Date(r.dateConstat))/86400000);
        if(diff>=0)setD(`reserves.${idx}.impact`,String(diff));
      }
    }
  }
  // Pour les cellules heuresHebdo, différer le render pour laisser
  // les clics de navigation semaine s'exécuter d'abord
  if(name.startsWith('heuresHebdo.')){
    setTimeout(render,80);
  } else {
    render();
  }
});

    if(action==='exportCR'){exportCRPdf();return;}

    if(action==='nextWeek'){state.hWeek=nextWeek(state.hWeek);render();return;}

      return;
    }
    if(action==='devisFromContact'){
      const ct=state.crmData.contacts.find(c=>c.id===id);
      newDevis(ct?ct.nom+(ct.societe?' ('+ct.societe+')':''):'');
      return;
    }
    // ── Devis ──
    if(action==='addDevis'){newDevis();return;}
    if(action==='openDevis'){state.devisId=id;render();return;}
    if(action==='closeDevis'){state.devisId=null;render();return;}
    if(action==='delDevis'){
      if(confirm('Supprimer ce devis ?')){
        state.devisData.list=state.devisData.list.filter(d=>d.id!==id);
        if(state.devisId===id)state.devisId=null;
        saveDevis();render();
      }
      return;
    }
    if(action==='dupDevis'){
      const src=state.devisData.list.find(d=>d.id===id);
      if(src){
        const cp=JSON.parse(JSON.stringify(src));
        cp.id='dv'+Date.now();cp.num=src.num+'-copie';cp.statut='Brouillon';cp.date=todayISO();
        state.devisData.list.unshift(cp);saveDevis();render();
      }
      return;
    }
    if(action==='addDevisLigne'){
      const dv=state.devisData.list.find(d=>d.id===state.devisId);
      if(dv){dv.lignes.push({designation:'',qte:'',unite:'',pu:'',tva:'20'});saveDevis();render();}
      return;
    }
    if(action==='addBibLine'){
      const item=BIB_CADENCES[parseInt(btn.dataset.bib)];
      const dv=state.devisData.list.find(d=>d.id===state.devisId);
      if(item&&dv){
        const ligne={designation:item.d+(item.s?' — '+item.s:''),qte:'',unite:item.u,
          pu:item.p>0?String(item.p):'',tva:'20',tps:item.t||0};
        // remplit la première ligne vide, sinon ajoute en fin
        const empty=dv.lignes.findIndex(l=>!l.designation&&!n(l.qte)&&!n(l.pu));
        if(empty>=0)dv.lignes[empty]=ligne;else dv.lignes.push(ligne);
        saveDevis();render();
        const q=document.querySelector(`input[name="devis.list.${state.devisData.list.indexOf(dv)}.lignes.${empty>=0?empty:dv.lignes.length-1}.qte"]`);
        if(q)q.focus();
      }
      return;
    }
    if(action==='delDevisLigne'){
      const dv=state.devisData.list.find(d=>d.id===state.devisId);
      if(dv){dv.lignes.splice(idx,1);saveDevis();render();}
      return;
    }
    if(action==='exportDevis'){exportDevisPdf(id);return;}
    if(action==='devisToChantier'){devisToChantier(id);return;}
    // ── Recherche globale / notifications / exports ──
    if(action==='searchGo'){searchGo(parseInt(btn.dataset.sr));return;}
    if(action==='toggleNotif'){state.notifOpen=!state.notifOpen;state.accountOpen=false;render();return;}
    if(action==='openNotif'){state.activeId=id;state.notifOpen=false;state.screen='dashboard';save();render();return;}
    if(action==='notifBackup'){state.notifOpen=false;exportBackup();render();return;}
    if(action==='exportCsv'){exportCsvKind(btn.dataset.kind);return;}
    // ── Compte / profil ──
    if(action==='toggleAccount'){toggleAccount();return;}
    if(action==='accountLogin'){accountLogin();return;}
    if(action==='accountLogout'){accountLogout();return;}
    if(action==='accountEdit'){accountEdit();return;}
    if(action==='exportBackup'){exportBackup();return;}
    // ── Field / mobile actions ──
    if(action==='toggleTheme'){toggleTheme();return;}
    if(action==='addJournalToday'){e.preventDefault();addJournalToday();return;}
    if(action==='quickAdd'){qaSubmit();return;}
    if(action==='setTaskView'){state.taskView=val;render();return;}
    if(action==='moveTask'){moveTask(idx,val);return;}
    if(action==='delPhoto'){delPhoto(id);return;}
    if(action==='openPhoto'){const ph=(getActive()?.d.photos||[]).find(p=>p.id===id);if(ph)window.open(ph.src,'_blank');return;}
    if(action==='aiJournal'){
      const ch=getActive();if(ch&&ch.d.journal[idx]){ch.d.journal[idx].resume=aiDaySummary(ch.d.journal[idx]);save();render();}
      return;
    }
    if(action==='exportJournal'){exportJournalPdf();return;}
    if(action==='exportWeekly'){exportWeeklyPdf();return;}
    if(action==='exportSynthese'){exportSynthesePdf();return;}
    if(action==='fabTasks'){const i=document.getElementById('qa-input');if(i){window.scrollTo(0,0);i.focus();}return;}
    if(action==='fabPhoto'){const i=document.querySelector('[data-photo-new]');if(i)i.click();return;}
    if(action==='fabCrm'){const i=document.getElementById('crm-qa');if(i){window.scrollTo(0,0);i.focus();}return;}
    return;
  }

  // Navigation générique : tout élément avec data-screen (rail, mobile-nav, tuiles, cartes cockpit)
  const scrEl=e.target.closest('[data-screen]');
  if(scrEl){
    state.screen=scrEl.dataset.screen;
    if((state.screen==='portfolio'||state.screen==='home')&&!state.activeId&&state.chantiers.length>0)
      state.activeId=state.chantiers[0].id;
    render();return;
  }

  // chantier switcher
  const sw=e.target.closest('#chantier-sw');
  if(sw){/* handled by change event */}
});

// ── Upload de fichiers (photos / documents) ──
document.addEventListener('change',async e=>{
  const inp=e.target;
  if(!inp||inp.tagName!=='INPUT'||inp.type!=='file'||!inp.files||!inp.files.length)return;
  // Import d'une sauvegarde (pas besoin de chantier actif)
  if(inp.dataset.importBackup!==undefined){
    try{const txt=await inp.files[0].text();importBackupData(JSON.parse(txt));}
    catch(err){console.warn(err);alert('Fichier illisible ou invalide.');}
    inp.value='';return;
  }
  const ch=getActive();if(!ch)return;const d=ch.d;
  const jrId=inp.dataset.photoJournal;
  const isDoc=inp.dataset.docNew!==undefined;
  const files=Array.from(inp.files);
  try{
    for(const f of files){
      if(isDoc){
        d.documents=d.documents||[];
        let src='';
        if(f.size<2000000){try{src=await fileToDataURLRaw(f);}catch(_){}}
        d.documents.unshift({id:'doc'+Date.now()+Math.random().toString(36).slice(2,6),name:f.name,categorie:guessDocCat(f.name),date:todayISO(),note:'',src,size:f.size});
      }else if(f.type.startsWith('image/')){
        d.photos=d.photos||[];
        const src=await fileToCompressedDataURL(f);
        const dt=jrId?((d.journal.find(x=>x.id===jrId)||{}).date||todayISO()):todayISO();
        d.photos.unshift({id:'ph'+Date.now()+Math.random().toString(36).slice(2,6),src,date:dt,note:'',link:jrId?'Journal':'',jrId:jrId||''});
      }
    }
    inp.value='';
    save();render();
  }catch(err){console.warn('upload error',err);alert("Impossible d'ajouter le fichier.");}
});

document.addEventListener('change',e=>{
  if(e.target.id==='chantier-sw'){
    state.activeId=e.target.value;
    save();
    render();
  }
},{capture:true});

// ── Recherche globale : saisie & raccourcis clavier ──
document.addEventListener('input',e=>{
  if(e.target&&e.target.id==='shell-search'){
    state.searchQ=e.target.value;
    renderSearchPop();
  }
});
document.addEventListener('keydown',e=>{
  // Ctrl/Cmd + K : focus sur la recherche globale
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='K')){
    const s=document.getElementById('shell-search');
    if(s){e.preventDefault();s.focus();s.select();}
    return;
  }
  // Échap : ferme panneaux (compte, notifications, recherche)
  if(e.key==='Escape'){
    let dirty=false;
    if(state.accountOpen){state.accountOpen=false;dirty=true;}
    if(state.notifOpen){state.notifOpen=false;dirty=true;}
    if(state.searchQ){
      state.searchQ='';
      const s=document.getElementById('shell-search');if(s)s.value='';
      renderSearchPop();
    }
    if(dirty)render();
  }
});

// Heures MO
function renderHeures(d,c){
  const tab=state.hTab||'semaine';
  const wk=state.hWeek||weekKey(new Date());
  const days=weekDays(wk);
  const weekNum=isoWeekNum(wk);
  const mon=weekOf(wk);
  const fmtMon=d2=>`${String(d2.getDate()).padStart(2,'0')}/${String(d2.getMonth()+1).padStart(2,'0')}/${d2.getFullYear()}`;
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);

  // Weekly grid
  const hebd=d.heuresHebdo||{};
  const weekData=hebd[wk]||{};

  // Total per day
  const dayTotals={lu:0,ma:0,me:0,je:0,ve:0,sa:0,di:0};
  let weekTotal=0;
  d.compagnons.forEach(comp=>{
    const cData=weekData[comp.id]||{};
    days.forEach(day=>{
      const h=n(cData[day.key]);
      dayTotals[day.key]+=h;
      weekTotal+=h;
    });
  });

  // Cumul all weeks per compagnon
  const cumByComp={};
  Object.values(hebd).forEach(wd=>{
    Object.entries(wd).forEach(([cId,cdays])=>{
      cumByComp[cId]=(cumByComp[cId]||0)+Object.values(cdays).reduce((s,v)=>s+n(v),0);
    });
  });

  const compRows=d.compagnons.map((comp,ci)=>{
    const cData=weekData[comp.id]||{};
    const rowTotal=days.reduce((s,day)=>s+n(cData[day.key]),0);
    const cumul=cumByComp[comp.id]||0;
    return`<tr>
      <td style="white-space:nowrap;font-weight:500">${esc(comp.prenom)} ${esc(comp.nom)}</td>
      <td><select name="compagnons.${ci}.categorie" style="width:110px">
        ${['Compagnon','Chef d\'équipe','Intérimaire','Autre'].map(v=>`<option${comp.categorie===v?' selected':''}>${v}</option>`).join('')}
      </select></td>
      ${days.map(day=>`<td class="${day.we?'day-we':''}">
        <input type="number" name="heuresHebdo.${wk}.${comp.id}.${day.key}" value="${cData[day.key]||''}" min="0" max="24" style="width:46px;text-align:center">
      </td>`).join('')}
      <td style="font-weight:700;text-align:right">${rowTotal>0?rowTotal+'h':'—'}</td>
      <td style="color:var(--sub);text-align:right">${cumul>0?cumul+'h':''}</td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="compagnons" data-idx="${ci}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');

  // Compagnons list (tab 2)
  const compList=d.compagnons.map((comp,ci)=>`<tr>
    <td><input type="text" name="compagnons.${ci}.prenom" value="${esc(comp.prenom)}" placeholder="Prénom" style="width:110px"></td>
    <td><input type="text" name="compagnons.${ci}.nom" value="${esc(comp.nom)}" placeholder="Nom" style="width:120px"></td>
    <td><select name="compagnons.${ci}.categorie">
      ${['Compagnon','Chef d\'équipe','Intérimaire','Autre'].map(v=>`<option${comp.categorie===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td style="color:var(--sub)">${(cumByComp[comp.id]||0)>0?(cumByComp[comp.id])+'h total':''}</td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="compagnons" data-idx="${ci}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');

  const catBars=Object.entries(c.catMap).map(([cat,h])=>`
    <div class="cat-bar">
      <span class="cat-label">${esc(cat)}</span>
      <div class="cat-bg"><div class="cat-fill" style="width:${c.hConso>0?Math.min(h/c.hConso*100,100):0}%"></div></div>
      <span class="cat-val">${h.toFixed(0)}h</span>
    </div>
  `).join('');

  return`
    <div class="page-head"><h1 class="page-title">Heures Main d'œuvre</h1>${csvBtn('heures')}</div>
    <div class="kpi-strip">
      <div class="kpi-card"><div class="kpi-label">Budget heures</div><div class="kpi-value">${c.hBudg||'—'}<span style="font-size:14px;font-weight:400"> h</span></div></div>
      <div class="kpi-card"><div class="kpi-label">Consommé (toutes semaines)</div><div class="kpi-value" style="color:${c.hColor}">${c.hConso>0?c.hConso:c.hConso||'—'}<span style="font-size:14px;font-weight:400"> h</span></div></div>
      <div class="kpi-card"><div class="kpi-label">Solde</div><div class="kpi-value" style="color:${c.hSolde<0?'var(--neg)':'var(--pos)'}">${c.hBudg?c.hSolde:'—'}<span style="font-size:14px;font-weight:400"> h</span></div></div>
      <div class="kpi-card"><div class="kpi-label">Compagnons actifs</div><div class="kpi-value">${d.compagnons.length}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Paramètres</div>
      <div class="param-row">
        <div class="form-field"><label class="form-label">Budget total (h)</label><input type="number" name="heures.budgetTotal" value="${d.heures.budgetTotal||''}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Taux horaire (€/h)</label><input type="number" name="heures.txHoraire" value="${d.heures.txHoraire||''}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Seuil alerte (%)</label><input type="number" name="heures.seuilAlerte" value="${d.heures.seuilAlerte||''}" class="form-input"></div>
      </div>
      ${c.hBudg?`<div class="prog-bar" style="height:10px;margin-bottom:6px"><div class="prog-fill" style="width:${Math.min(c.hPct,100)}%;background:${c.hColor}"></div></div>
      <div style="display:flex;gap:24px;font-size:13px">
        <span>Coût MO budget : <strong>${eurRaw(c.hBudg*c.txH)}</strong></span>
        <span>Coût MO réel : <strong>${eurRaw(c.hConso*c.txH)}</strong></span>
      </div>`:''}
    </div>
    ${catBars?`<div class="card" style="margin-bottom:14px"><div class="card-title">Répartition par catégorie</div>${catBars}</div>`:''}
    ${cadenceCard(d,c)}
    <div class="card">
      <div class="tabs">
        <button class="tab-btn${tab==='semaine'?' active':''}" data-action="hTab" data-val="semaine">Saisie hebdomadaire</button>
        <button class="tab-btn${tab==='compagnons'?' active':''}" data-action="hTab" data-val="compagnons">Compagnons (${d.compagnons.length})</button>
      </div>

      ${tab==='compagnons'?`
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Prénom</th><th>Nom</th><th>Catégorie</th><th>Total cumulé</th><th></th></tr></thead>
            <tbody>${compList||'<tr><td colspan="5" style="text-align:center;color:var(--sub);padding:20px">Aucun compagnon — cliquez "Ajouter"</td></tr>'}</tbody>
          </table>
        </div>
        <button class="add-row-btn" data-action="addRow" data-list="compagnons">${svgIcon(ico.plus,13)} Ajouter compagnon</button>
      `:`
        <div class="week-nav">
          <button type="button" onclick="navWeek('prev')">${svgIcon('<polyline points="15 18 9 12 15 6"/>',16)}</button>
          <span class="week-label">Semaine ${weekNum} — ${fmtMon(mon)} au ${fmtMon(sun)}</span>
          <button type="button" onclick="navWeek('next')">${svgIcon('<polyline points="9 18 15 12 9 6"/>',16)}</button>
          <span style="font-size:12px;color:var(--sub)">Total : <strong>${weekTotal>0?weekTotal+'h':'—'}</strong></span>
        </div>
        ${d.compagnons.length===0?`<div style="padding:24px;text-align:center;color:var(--sub)">Ajoutez des compagnons dans l'onglet "Compagnons" d'abord.</div>`:`
        <div class="tbl-wrap">
          <table class="week-grid">
            <thead><tr>
              <th>Prénom Nom</th><th>Catégorie</th>
              ${days.map(day=>`<th class="${day.we?'day-we':''}">${day.label}<br><span style="font-weight:400;font-size:11px">${day.num} ${day.month}</span></th>`).join('')}
              <th>Total sem.</th><th>Cumulé</th><th></th>
            </tr></thead>
            <tbody>${compRows}</tbody>
            <tfoot><tr>
              <td colspan="2" style="font-weight:700">Total journée</td>
              ${days.map(day=>`<td class="${day.we?'day-we':''}" style="text-align:center;font-weight:700">${dayTotals[day.key]>0?dayTotals[day.key]+'h':'—'}</td>`).join('')}
              <td style="font-weight:700;text-align:right">${weekTotal>0?weekTotal+'h':'—'}</td>
              <td colspan="2"></td>
            </tr></tfoot>
          </table>
        </div>`}
        <button class="add-row-btn" type="button" style="margin-top:8px" onclick="setHTab('compagnons')">${svgIcon(ico.plus,13)} Gérer les compagnons</button>
      `}
    </div>
  `;
}

    return[
      `<tr>

        </select></td>
