// Checklist
function renderChecklist(d,c){
  function phaseHtml(list,path,title){
    const done=list.filter(x=>x.done).length;
    const total=list.length;
    return`
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title" style="margin:0">${title}</div>
          <span class="badge ${done===total?'badge-green':'badge-blue'}">${done}/${total}</span>
        </div>
        <div class="prog-bar" style="margin-bottom:12px"><div class="prog-fill" style="width:${total?done/total*100:0}%;background:var(--pos)"></div></div>
        ${list.map((item,i)=>`
          <div class="cl-item">
            <input type="checkbox" name="${path}.${i}.done" ${item.done?'checked':''}>
            <span class="cl-label${item.done?' done':''}">${esc(item.item)}</span>
            <input type="date" name="${path}.${i}.date" value="${item.date||''}" class="form-input cl-date" style="width:130px">

  return`
    <h1 class="page-title">Check-list</h1>
    ${phaseHtml(d.checklistDemarrage,'checklistDemarrage','Phase 1 — Démarrage')}
    ${phaseHtml(d.checklistReception,'checklistReception','Phase 2 — Réception')}
  `;
}

      <div class="kpi-card"><div class="kpi-label">Montant estimé</div><div class="kpi-value" style="font-size:17px">${c.tsEstime>0?eurRaw(c.tsEstime):'—'}</div></div>

// CR Chantier
function renderCR(d,c){
  const cr=d.cr;

  function fld(path,label,type='text',opts=null,span=1){
    const val=getVal(d,path);
    const s=span>1?`style="grid-column:span ${span}"`:'';
    if(type==='textarea')return`<div class="form-field" ${s||'style="grid-column:span 2"'}><label class="form-label">${label}</label><textarea class="form-textarea" name="${path}" rows="3">${esc(val)}</textarea></div>`;
    if(type==='select')return`<div class="form-field" ${s}><label class="form-label">${label}</label><select class="form-select" name="${path}">${opts.map(v=>`<option${val===v?' selected':''}>${v}</option>`).join('')}</select></div>`;
    return`<div class="form-field" ${s}><label class="form-label">${label}</label><input type="${type}" class="form-input" name="${path}" value="${esc(val)}"></div>`;
  }

  const statColor={P:'#107e3e',A:'#d20a0a',E:'#e76500'};

  // Intervenants
  const intRows=(d.crIntervenants||[]).map((p,i)=>`<tr>
    <td><input type="text" name="crIntervenants.${i}.nom" value="${esc(p.nom)}" style="width:120px"></td>
    <td><input type="text" name="crIntervenants.${i}.role" value="${esc(p.role)}" style="width:120px"></td>
    <td><input type="text" name="crIntervenants.${i}.adresse" value="${esc(p.adresse)}" style="width:150px"></td>
    <td><input type="text" name="crIntervenants.${i}.telephone" value="${esc(p.telephone)}" style="width:110px"></td>
    <td><select name="crIntervenants.${i}.statut" class="form-select" style="width:55px;color:${statColor[p.statut||'P']}">
      <option${p.statut==='P'?' selected':''} style="color:#107e3e">P</option>
      <option${p.statut==='A'?' selected':''} style="color:#d20a0a">A</option>
      <option${p.statut==='E'?' selected':''} style="color:#e76500">E</option>
    </select></td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="crIntervenants" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');

  // Suivi par lot
  const lotsHtml=(d.crLots||[]).map((l,i)=>`
    <div class="card" style="margin-bottom:10px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <div style="background:var(--nav);color:#fff;border-radius:6px;padding:4px 10px;font-weight:700;font-size:13px">Lot ${esc(l.lot)||String.fromCharCode(65+i)}</div>
          <div style="flex:1"><label class="form-label" style="margin-bottom:2px">Lot</label><input type="text" name="crLots.${i}.lot" value="${esc(l.lot)}" class="form-input" style="width:80px"></div>
          <div style="flex:3"><label class="form-label" style="margin-bottom:2px">Entreprise</label><input type="text" name="crLots.${i}.entreprise" value="${esc(l.entreprise)}" class="form-input" style="width:100%"></div>
        </div>
        <button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="crLots" data-idx="${i}" style="margin-left:10px">${svgIcon(ico.trash,13)}</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-field"><label class="form-label">a) Travaux réalisés</label><textarea class="form-textarea" name="crLots.${i}.travRealis" rows="3">${esc(l.travRealis)}</textarea></div>
        <div class="form-field"><label class="form-label">b) Travaux en cours</label><textarea class="form-textarea" name="crLots.${i}.travEnCours" rows="3">${esc(l.travEnCours)}</textarea></div>
        <div class="form-field"><label class="form-label">c) Travaux restant</label><textarea class="form-textarea" name="crLots.${i}.travRestant" rows="3">${esc(l.travRestant)}</textarea></div>
        <div class="form-field"><label class="form-label">d) Problèmes rencontrés</label><textarea class="form-textarea" name="crLots.${i}.problemes" rows="3">${esc(l.problemes)}</textarea></div>
        <div class="form-field"><label class="form-label">e) Planning (respect, retards, délais)</label><textarea class="form-textarea" name="crLots.${i}.planning" rows="2">${esc(l.planning)}</textarea></div>
        <div class="form-field"><label class="form-label">f) Documents (plans, rapports)</label><textarea class="form-textarea" name="crLots.${i}.documents" rows="2">${esc(l.documents)}</textarea></div>
        <div class="form-field" style="grid-column:span 2"><label class="form-label">g) Divers</label><textarea class="form-textarea" name="crLots.${i}.divers" rows="2">${esc(l.divers)}</textarea></div>
      </div>
    </div>`).join('');

  // Actions
  const actRows=(d.crActions||[]).map((a,i)=>`<tr>
    <td><input type="text" name="crActions.${i}.responsable" value="${esc(a.responsable)}" style="width:120px"></td>
    <td style="min-width:220px"><input type="text" name="crActions.${i}.tache" value="${esc(a.tache)}" style="width:100%"></td>
    <td><input type="text" name="crActions.${i}.delai" value="${esc(a.delai)}" style="width:110px"></td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="crActions" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');

  // Historique
  const histRows=(d.crHistorique||[]).map((h,i)=>`<tr>
    <td><input type="text" name="crHistorique.${i}.num" value="${esc(h.num)}" style="width:70px"></td>
    <td><input type="date" name="crHistorique.${i}.date" value="${h.date||''}"></td>
    <td><input type="text" name="crHistorique.${i}.type" value="${esc(h.type)}" style="width:140px"></td>
    <td><input type="text" name="crHistorique.${i}.redacteur" value="${esc(h.redacteur)}" style="width:110px"></td>
    <td><input type="number" name="crHistorique.${i}.avancement" value="${h.avancement||''}" style="width:55px"> %</td>
    <td><input type="text" name="crHistorique.${i}.pointsLeves" value="${esc(h.pointsLeves)}" style="width:120px"></td>
    <td><input type="text" name="crHistorique.${i}.pointsOuverts" value="${esc(h.pointsOuverts)}" style="width:120px"></td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="crHistorique" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h1 class="page-title" style="margin:0">CR Chantier</h1>
      <button class="btn btn-primary" data-action="exportCR">${svgIcon(ico.pdf,14)} Exporter PDF</button>
    </div>

    <!-- 1. GÉNÉRALITÉS -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">1. Généralités</div>
      <div class="form-grid" style="grid-template-columns:repeat(4,1fr)">
        ${fld('cr.numCR','N° CR')}
        ${fld('cr.date','Date','date')}
        ${fld('cr.heure','Heure','time')}

        ${fld('ident.nom','Ouvrage','text',null,2)}
        ${fld('ident.adresse','Adresse','text',null,2)}
        ${fld('cr.objetJour','Objet du jour','textarea',null,4)}
        ${fld('cr.redacteur','Rédigé par','text',null,2)}
        ${fld('cr.diffusion','Diffusion','text',null,2)}
        ${fld('cr.prochaine','Date prochaine réunion','date',null,2)}
      </div>
    </div>

    <!-- INTERVENANTS -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Intervenants</div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:8px">P = Présent &nbsp;·&nbsp; A = Absent &nbsp;·&nbsp; E = Excusé</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Nom</th><th>Rôle</th><th>Adresse</th><th>Téléphone</th><th>P / A / E</th><th></th></tr></thead>
          <tbody>${intRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="crIntervenants">${svgIcon(ico.plus,13)} Ajouter intervenant</button>
    </div>

    <!-- 2. SUIVI DU CHANTIER -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">2. Suivi du chantier</div>
      ${lotsHtml}
      <button class="add-row-btn" data-action="addRow" data-list="crLots">${svgIcon(ico.plus,13)} Ajouter lot</button>
    </div>

    <!-- 3. SÉCURITÉ, HYGIÈNE, SANTÉ -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">3. Sécurité, hygiène, santé</div>
      <div class="form-grid" style="grid-template-columns:1fr">
        <div class="form-field"><label class="form-label">A. Rappels des règles</label><textarea class="form-textarea" name="cr.securiteRegles" rows="3">${esc(cr.securiteRegles||'')}</textarea></div>
        <div class="form-field"><label class="form-label">B. Accidents du travail</label><textarea class="form-textarea" name="cr.accidents" rows="3">${esc(cr.accidents||'')}</textarea></div>
        <div class="form-field"><label class="form-label">C. Intempéries</label><textarea class="form-textarea" name="cr.intemperies" rows="2">${esc(cr.intemperies||'')}</textarea></div>
      </div>
    </div>

    <!-- 4. ACTIONS -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">4. Actions</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Responsable</th><th>Tâche</th><th>Délai</th><th></th></tr></thead>
          <tbody>${actRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="crActions">${svgIcon(ico.plus,13)} Ajouter action</button>
    </div>

    <!-- 5. ANNEXES -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">5. Annexes</div>
      <div class="form-field"><label class="form-label">Pièces jointes, documents, plans, dessins...</label><textarea class="form-textarea" name="cr.annexes" rows="4">${esc(cr.annexes||'')}</textarea></div>
    </div>

    <!-- FINANCES (suivi app) -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Finances</div>
      <div class="form-grid" style="grid-template-columns:repeat(4,1fr)">
        ${fld('cr.sitEmise','Situation émise')}
        ${fld('cr.encaissement','Encaissement')}
        ${fld('cr.avenantsCours','Avenants en cours')}
        ${fld('cr.tsValides','TS validés')}
      </div>
      <div class="form-grid" style="grid-template-columns:1fr;margin-top:8px">
        ${fld('cr.litiges','Litiges / Contentieux','textarea')}

    <!-- HISTORIQUE -->

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Réf.</th><th>Date</th><th>Type</th><th>Rédacteur</th><th>Avancement</th><th>Points levés</th><th>Points ouverts</th><th></th></tr></thead>

  win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">

// ── Suivi des cadences / heures (carte Heures) ────────────────────────────────
// Par ouvrage : quantité réalisée, heures passées, rendement réel vs prévu,
// temps unitaire et coût de main d'œuvre. Remplace le budget vs réel par poste.
function cadenceCard(d,c){
  const entries=d.heuresEntries||[];
  let totH=0,totCout=0;
  const rows=entries.map((e,i)=>{
    const h=n(e.heures),q=n(e.qte),prev=n(e.cadencePrev),tx=c.txH;
    const rend=h>0?q/h:0;                 // rendement réel (u/h)
    const tps=q>0?h/q:0;                  // temps unitaire (h/u)
    const cout=h*tx;                       // coût MO
    const coutU=q>0?cout/q:0;             // coût unitaire
    const ecart=prev>0?(rend-prev)/prev*100:0;
    totH+=h;totCout+=cout;
    const ecartColor=ecart>=0?'var(--pos)':'var(--neg)';
    return`<tr>
      <td><input type="text" name="heuresEntries.${i}.ouvrage" value="${esc(e.ouvrage)}" style="width:140px" placeholder="Ouvrage / tâche"></td>
      <td><input type="text" name="heuresEntries.${i}.unite" value="${esc(e.unite)}" style="width:55px" placeholder="m², ml…"></td>
      <td><input type="number" name="heuresEntries.${i}.qte" value="${e.qte||''}" style="width:70px" placeholder="0"></td>
      <td><input type="number" name="heuresEntries.${i}.heures" value="${e.heures||''}" style="width:65px" placeholder="0"> h</td>
      <td class="auto" style="font-weight:600">${rend>0?num2(rend):'—'}</td>
      <td><input type="number" name="heuresEntries.${i}.cadencePrev" value="${e.cadencePrev||''}" style="width:60px" placeholder="0"></td>
      <td class="auto" style="font-weight:600;color:${prev>0?ecartColor:'var(--sub)'}">${prev>0?(ecart>=0?'+':'')+ecart.toFixed(0)+'%':'—'}</td>
      <td class="auto">${tps>0?num2(tps):'—'}</td>
      <td class="auto">${cout>0?eurRaw(cout):'—'}</td>
      <td class="auto">${coutU>0?eurRaw(coutU):'—'}</td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="heuresEntries" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');
  return`
    <div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:6px">Suivi des cadences & heures par ouvrage</div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:10px">
        Rendement réel = quantité ÷ heures (dans l'unité de l'ouvrage). Comparez-le à la cadence prévue pour repérer les dérives de productivité. Coût MO = heures × ${c.txH} €/h.
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Ouvrage</th><th>Unité</th><th>Qté réal.</th><th>Heures</th><th>Rendt réel<br><span style="font-weight:400">(u/h)</span></th><th>Cadence prévue<br><span style="font-weight:400">(u/h)</span></th><th>Écart</th><th>Temps unit.<br><span style="font-weight:400">(h/u)</span></th><th>Coût MO</th><th>Coût / u</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan="11" style="text-align:center;color:var(--sub);padding:16px">Aucun ouvrage suivi — cliquez « Ajouter ».</td></tr>'}</tbody>
          <tfoot><tr style="background:#f0f2f5;font-weight:700">
            <td colspan="3">Total</td>
            <td>${totH>0?totH+' h':'—'}</td>
            <td colspan="4"></td>
            <td>${totCout>0?eurRaw(totCout):'—'}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="heuresEntries">${svgIcon(ico.plus,13)} Ajouter un ouvrage</button>
    </div>
  `;
}

// Finance / RAF
function renderFinance(d,c){
  // ── Flux financier ──────────────────────────────────────────────────────────
  const txFact=c.marcheActualise>0?c.totalFacture/c.marcheActualise*100:0;
  const txEnc=c.totalFacture>0?c.totalEncaisse/c.totalFacture*100:0;
  const retardsSit=c.situations.filter(s=>s.retard>0).length;

  // ── Dépenses engagées : voir depensesEngageesCard (100% automatique) ──
  //    Cadences/heures par ouvrage : voir cadenceCard (rubrique Heures).

  // ── Situations ──────────────────────────────────────────────────────────────
  const sitRows=c.situations.map((sit,i)=>{
    const statColor=sit.statut==='Payé'?'var(--pos)':sit.retard>0?'var(--neg)':sit.statut==='Visé'?'var(--acc)':'var(--sub)';
    const txSit=c.marcheActualise>0?n(sit.montantHT)/c.marcheActualise*100:0;
    return`<tr style="${sit.retard>0?'background:#fff5f5':''}">
      <td style="font-weight:600">${sit.num}</td>
      <td><input type="text" name="situations.${i}.periode" value="${esc(sit.periode)}" style="width:110px"></td>
      <td><input type="date" name="situations.${i}.dateEnvoi" value="${sit.dateEnvoi||''}"></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="situations.${i}.montantHT" value="${sit.montantHT||''}" style="width:90px"></div></td>
      <td class="auto" style="font-weight:500">${sit.cumul>0?eurRaw(sit.cumul):'—'}</td>
      <td class="auto">${txSit>0?txSit.toFixed(1)+'%':'—'}</td>
      <td><input type="date" name="situations.${i}.datePaiement" value="${sit.datePaiement||''}"></td>
      <td><input type="number" name="situations.${i}.delai" value="${sit.delai||'30'}" style="width:45px"> j</td>
      <td>
        <select name="situations.${i}.statut" style="color:${statColor};font-weight:600">
          ${['—','En attente','Visé','Payé'].map(v=>`<option${sit.statut===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td>${sit.retard>0
        ?`<span style="color:var(--neg);font-weight:700;font-size:12px">${sit.retard}j retard</span>`
        :sit.statut==='Payé'
          ?`<span style="color:var(--pos);font-size:12px">✓</span>`
          :'<span style="color:var(--sub);font-size:12px">—</span>'}
      </td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="situations" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');

  // ── Avenants ────────────────────────────────────────────────────────────────
  const avCumul=d.avenants.reduce((s,a)=>s+n(a.montant),0);
  const avRows=d.avenants.map((av,i)=>{
    const statColor=av.statut==='Signé'?'var(--pos)':av.statut==='Refusé'?'var(--neg)':av.statut==='En cours'?'var(--warn)':'var(--sub)';
    return`<tr>
      <td style="font-weight:600">${av.num}</td>
      <td><input type="text" name="avenants.${i}.designation" value="${esc(av.designation)}" style="width:170px"></td>
      <td><input type="date" name="avenants.${i}.date" value="${av.date||''}"></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="avenants.${i}.montant" value="${av.montant||''}" style="width:90px"></div></td>
      <td style="white-space:nowrap"><input type="number" name="avenants.${i}.impactDelai" value="${esc(av.impactDelai)}" style="width:50px"> j</td>
      <td><input type="text" name="avenants.${i}.poste" value="${esc(av.poste)}" style="width:80px"></td>
      <td>
        <select name="avenants.${i}.statut" style="color:${statColor};font-weight:600">
          ${['—','En cours','Signé','Refusé'].map(v=>`<option${av.statut===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" name="avenants.${i}.obs" value="${esc(av.obs)}" style="width:110px"></td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="avenants" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');

  // ── RAF table ───────────────────────────────────────────────────────────────
  let rafTotBI=0,rafTotBV=0,rafTotReel=0,rafTotRAD=0,rafTotEAC=0;
  const rafRows=c.rafDefs.map(row=>{
    const rl=d.raf.lines[row.id]||{};
    const bi=n(rl.bi);const bv=n(rl.bv);
    const rad=n(rl.rad);
    const reel=row.manual?n(rl.reel):row.reel;
    const eng=row.manual?n(rl.eng):row.eng;
    const eac=reel+rad;
    const pctCA=c.marcheActualise>0?eac/c.marcheActualise*100:0;
    const monthVal=c.rafCnt>0?rad/c.rafCnt:0;
    const ecartRAF=bv>0?bv-eac:0;
    rafTotBI+=bi;rafTotBV+=bv;rafTotReel+=reel;rafTotRAD+=rad;rafTotEAC+=eac;
    return`<tr>
      <td class="sticky" style="font-weight:500">${esc(row.label)}</td>
      <td style="font-size:11px;color:var(--sub);white-space:nowrap">${esc(row.src)}</td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.bi" value="${rl.bi||''}" style="width:80px"></div></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.bv" value="${rl.bv||''}" style="width:80px"></div></td>
      <td class="auto">${reel>0?eurRaw(reel):'—'}</td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.rad" value="${rl.rad||''}" style="width:80px"></div></td>
      <td class="auto" style="font-weight:600">${eac>0?eurRaw(eac):'—'}</td>
      <td class="auto" style="color:${ecartRAF<0?'var(--neg)':ecartRAF>0?'var(--pos)':'var(--sub)'}">${bv>0?eurRaw(ecartRAF):'—'}</td>
      <td class="auto">${pctCA>0?pctCA.toFixed(1)+'%':'—'}</td>
      ${row.manual
        ?`<td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.reel" value="${rl.reel||''}" style="width:75px"></div></td><td><div class="amt-cell"><span class="sym">€</span><input type="number" name="raf.lines.${row.id}.eng" value="${rl.eng||''}" style="width:75px"></div></td>`
        :`<td class="auto">${reel>0?eurRaw(reel):'—'}</td><td class="auto">${eng>0?eurRaw(eng):'—'}</td>`}
      ${c.rafMonths.map(m=>`<td class="auto" style="white-space:nowrap;color:var(--sub)">${monthVal>0?eurRaw(monthVal):'—'}</td>`).join('')}
    </tr>`;
  }).join('');

  const rafTotPctCA=c.marcheActualise>0?rafTotEAC/c.marcheActualise*100:0;
  const rafTotEcart=rafTotBV>0?rafTotBV-rafTotEAC:0;

  // ── Indicateurs de marge (sémantique BTP) ──────────────────────────────────
  const recettes=c.marcheActualise;                 // CA prévu (marché actualisé)
  const coutObjectif=c.budgetCR;                     // budget de revient objectif
  const engage=c.reelEngage;                          // dépensé / engagé à date
  const rad=c.resteAEngager>0?c.resteAEngager:Math.max(0,coutObjectif-engage); // reste à dépenser
  const eacF=engage+rad;                              // coût final prévu (EAC)
  const margeObj=recettes-coutObjectif;
  const tauxObj=recettes>0?margeObj/recettes*100:0;
  const margePrev=recettes-eacF;
  const tauxPrev=recettes>0?margePrev/recettes*100:0;
  const ecartMarge=margePrev-margeObj;
  const facture=c.totalFacture,encaisse=c.totalEncaisse;
  const resteAFacturer=Math.max(0,recettes-facture);
  const treso=encaisse-engage;
  const consoBudget=coutObjectif>0?engage/coutObjectif*100:0;
  const retardMontant=c.situations.filter(s=>s.retard>0).reduce((s,x)=>s+n(x.montantHT),0);
  const refMax=Math.max(recettes,eacF,coutObjectif,1);
  const w=v=>Math.max(0,Math.min(100,v/refMax*100));
  const margeColor=margePrev<0?'var(--neg)':margePrev>=margeObj?'var(--pos)':'var(--warn)';
  const kpi=(label,val,sub,color)=>`<div class="ck-card"><div class="ck-head">${label}</div><div class="ck-val" style="font-size:20px;${color?`color:${color}`:''}">${val}</div>${sub?`<div style="font-size:11px;color:var(--sub)">${sub}</div>`:''}</div>`;

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap">
      <h1 class="page-title" style="margin:0">Suivi financier</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" data-action="exportWeekly">${svgIcon(ico.pdf,13)} Rapport hebdo</button>
        <button class="btn btn-ghost btn-sm" data-action="exportSynthese">${svgIcon(ico.pdf,13)} Synthèse client</button>
      </div>
    </div>

    <!-- KPI marge -->
    <div class="cockpit-grid">
      ${kpi('Marché actualisé',recettes>0?eurRaw(recettes):'—',`Initial ${eurRaw(c.marcheInitial)} · Avenants ${c.avenantsSignes>=0?'+':''}${eurRaw(c.avenantsSignes)}`,'var(--acc)')}
      ${kpi('Coût final prévu (EAC)',eacF>0?eurRaw(eacF):'—',`Engagé ${eurRaw(engage)} + RAD ${eurRaw(rad)}`)}
      ${kpi('Marge prévisionnelle',recettes>0?eurRaw(margePrev):'—',`${recettes>0?pct(tauxPrev):'—'} · objectif ${recettes>0?pct(tauxObj):'—'}`,margeColor)}
      ${kpi('Trésorerie chantier',(encaisse||engage)?eurRaw(treso):'—',`Encaissé ${eurRaw(encaisse)} − dépensé ${eurRaw(engage)}`,treso<0?'var(--neg)':'var(--pos)')}
    </div>

    <!-- Compte de résultat visuel -->
    <div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:12px">${svgIcon(ico.fin,14)} Compte de résultat prévisionnel</div>
      <div class="fin-line">
        <span class="fin-lbl">Recettes (marché)</span>
        <div class="fin-track"><div class="fin-seg" style="width:${w(recettes)}%;background:var(--acc)"></div></div>
        <span class="fin-amt">${eurRaw(recettes)}</span>
      </div>
      <div class="fin-line">
        <span class="fin-lbl">Coût final (EAC)</span>
        <div class="fin-track">
          <div class="fin-seg" style="width:${w(engage)}%;background:var(--neg)" title="Déjà engagé"></div>
          <div class="fin-seg" style="width:${w(rad)}%;background:#f3b0b0" title="Reste à dépenser"></div>
        </div>
        <span class="fin-amt">${eurRaw(eacF)}</span>
      </div>
      <div class="fin-line">
        <span class="fin-lbl">Marge prévue</span>
        <div class="fin-track"><div class="fin-seg" style="width:${w(Math.max(margePrev,0))}%;background:${margePrev<0?'var(--neg)':'var(--pos)'}"></div></div>
        <span class="fin-amt" style="color:${margeColor}">${eurRaw(margePrev)} · ${recettes>0?pct(tauxPrev):'—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--sub);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
        <span><span style="color:var(--neg)">■</span> engagé &nbsp; <span style="color:#f3b0b0">■</span> reste à dépenser &nbsp; <span style="color:var(--pos)">■</span> marge</span>
        <span>Écart vs objectif : <strong style="color:${ecartMarge<0?'var(--neg)':'var(--pos)'}">${ecartMarge>=0?'+':''}${eurRaw(ecartMarge)}</strong></span>
      </div>
      <div style="margin-top:12px">
        <div style="font-size:11px;color:var(--sub);margin-bottom:3px">Consommation du budget objectif · <strong>${consoBudget.toFixed(0)}%</strong></div>
        <div class="prog-bar" style="height:10px"><div class="prog-fill" style="width:${Math.min(consoBudget,100)}%;background:${consoBudget>100?'var(--neg)':consoBudget>90?'var(--warn)':'var(--acc)'}"></div></div>
      </div>
    </div>

    <!-- Marché : composition -->
    <div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:10px">${svgIcon(ico.dash,14)} Composition du marché</div>
      <div class="fin-flow">
        <div class="fin-box"><div class="fb-l">Marché initial</div><div class="fb-v">${c.marcheInitial>0?eurRaw(c.marcheInitial):'—'}</div></div>
        <div class="fin-arrow">+</div>
        <div class="fin-box"><div class="fb-l">Avenants signés</div><div class="fb-v" style="color:${c.avenantsSignes>=0?'var(--pos)':'var(--neg)'}">${c.avenantsSignes!==0?(c.avenantsSignes>0?'+':'')+eurRaw(c.avenantsSignes):'—'}</div></div>
        <div class="fin-arrow">=</div>
        <div class="fin-box" style="border-color:var(--acc)"><div class="fb-l">Marché actualisé</div><div class="fb-v" style="color:var(--acc)">${recettes>0?eurRaw(recettes):'—'}</div></div>
      </div>
    </div>

    <!-- Facturation & encaissement -->
    <div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:12px">${svgIcon(ico.fin,14)} Facturation & trésorerie</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="cockpit-2col">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>Facturé</span><strong>${facture>0?eurRaw(facture):'—'}</strong></div>
          <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${Math.min(txFact,100)}%;background:var(--acc)"></div></div>
          <div class="note">${txFact.toFixed(0)}% du marché · reste à facturer ${eurRaw(resteAFacturer)}</div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>Encaissé</span><strong style="color:var(--pos)">${encaisse>0?eurRaw(encaisse):'—'}</strong></div>
          <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${Math.min(txEnc,100)}%;background:var(--pos)"></div></div>
          <div class="note">${txEnc.toFixed(0)}% du facturé${retardsSit>0?` · <span style="color:var(--neg);font-weight:600">${retardsSit} retard(s) — ${eurRaw(retardMontant)}</span>`:''}</div>
        </div>
      </div>
    </div>

    ${depensesEngageesCard(d,c)}

    <!-- Paramètres financiers -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Paramètres financiers <span class="note" style="font-size:11px;margin-left:6px">— laissez vide pour un calcul automatique depuis les postes</span></div>
      <div class="form-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
        <div class="form-field"><label class="form-label">Marché initial HT</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.marcheInitial" value="${d.finance.marcheInitial||''}" class="form-input"></div></div>
        <div class="form-field"><label class="form-label">Avenants signés</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.avenantsSignes" value="${d.finance.avenantsSignes||''}" class="form-input" placeholder="auto : ${eurRaw(avCumul)}"></div></div>
        <div class="form-field"><label class="form-label">Budget objectif (CR)</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.budgetCR" value="${d.finance.budgetCR||''}" class="form-input" placeholder="auto : ${eurRaw(c.marcheInitial)}"></div></div>
        <div class="form-field"><label class="form-label">Réel engagé à date</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.reelEngage" value="${d.finance.reelEngage||''}" class="form-input" placeholder="auto : ${eurRaw(c.reelEngageAuto)}"></div></div>
        <div class="form-field"><label class="form-label">Reste à engager</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.resteAEngager" value="${d.finance.resteAEngager||''}" class="form-input" placeholder="auto : ${eurRaw(rad)}"></div></div>
        <div class="form-field"><label class="form-label">Frais généraux chantier</label>
          <div class="amt-cell"><span class="sym">€</span><input type="number" name="finance.fgChantier" value="${d.finance.fgChantier||''}" class="form-input"></div></div>
      </div>
    </div>

    <!-- Situations de travaux -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
        <div class="card-title" style="margin:0">Situations de travaux</div>
        ${csvBtn('situations')}
        <div style="display:flex;gap:12px;font-size:12px">
          <span>Facturé : <strong>${facture>0?eurRaw(facture):'—'}</strong></span>
          <span>Encaissé : <strong style="color:var(--pos)">${encaisse>0?eurRaw(encaisse):'—'}</strong></span>
          ${retardsSit>0?`<span style="color:var(--neg);font-weight:600">${retardsSit} retard${retardsSit>1?'s':''}</span>`:''}
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>N°</th><th>Période</th><th>Date envoi</th><th>Montant HT</th><th>Cumul HT</th><th>% marché</th><th>Date paiement</th><th>Délai</th><th>Statut</th><th>État</th><th></th></tr></thead>
          <tbody>${sitRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="situations">${svgIcon(ico.plus,13)} Ajouter situation</button>
    </div>

    <!-- Avenants -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
        <div class="card-title" style="margin:0">Avenants</div>
        <div style="font-size:12px">
          Cumul avenants : <strong style="color:${avCumul>=0?'var(--pos)':'var(--neg)'}">${avCumul!==0?eurRaw(avCumul):'—'}</strong>
          &nbsp;·&nbsp; ${d.avenants.filter(a=>a.statut==='Signé').length} signé(s) / ${d.avenants.filter(a=>a.designation).length} total
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>N°</th><th>Désignation</th><th>Date</th><th>Montant HT</th><th>Impact délai</th><th>Poste</th><th>Statut</th><th>Obs.</th><th></th></tr></thead>
          <tbody>${avRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="avenants">${svgIcon(ico.plus,13)} Ajouter avenant</button>
    </div>

    <!-- RAF (analyse détaillée SAP) -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Analyse RAF (reste à faire) — par nature de coût</div>
      <div class="param-row" style="margin-bottom:10px">
        <div class="form-field"><label class="form-label">Mois de référence</label><input type="month" name="raf.moisRef" value="${d.raf.moisRef||''}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Clé SAP</label><input type="text" name="raf.cle" value="${esc(d.raf.cle)}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Méthode</label><select name="raf.methode" class="form-select">
          ${['Avancement physique','À terminaison','Réengagement'].map(v=>`<option${d.raf.methode===v?' selected':''}>${v}</option>`).join('')}
        </select></div>
        <div class="form-field" style="flex:2"><label class="form-label">Commentaires</label><input type="text" name="raf.commentaires" value="${esc(d.raf.commentaires)}" class="form-input"></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="position:sticky;left:0;background:#f0f2f5;z-index:2;min-width:130px">Poste</th>
            <th>Source</th><th>Budget init.</th><th>Budget validé</th>
            <th>Réel cumulé</th><th>Reste à dép.</th><th>EAC</th><th>Écart BV-EAC</th><th>% CA</th>
            <th>Réel M</th><th>Engagement</th>
            ${c.rafMonths.map(m=>`<th style="white-space:nowrap">${m}</th>`).join('')}
          </tr></thead>
          <tbody>${rafRows}</tbody>
          <tfoot><tr style="background:#f0f2f5;font-weight:700">
            <td colspan="2">Total RAF</td>
            <td>${rafTotBI>0?eurRaw(rafTotBI):'—'}</td>
            <td>${rafTotBV>0?eurRaw(rafTotBV):'—'}</td>
            <td>${rafTotReel>0?eurRaw(rafTotReel):'—'}</td>
            <td>${rafTotRAD>0?eurRaw(rafTotRAD):'—'}</td>
            <td>${rafTotEAC>0?eurRaw(rafTotEAC):'—'}</td>
            <td style="color:${rafTotEcart<0?'var(--neg)':'var(--pos)'}">${rafTotBV>0?eurRaw(rafTotEcart):'—'}</td>
            <td>${rafTotPctCA>0?rafTotPctCA.toFixed(1)+'%':'—'}</td>
            <td colspan="${2+c.rafMonths.length}"></td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  `;
}

// ST
function renderST(d,c){
  const stKpis=[
    ['ST actifs',c.stActifs,'var(--text)'],
    ['Marché ST total',c.stTotal>0?eurRaw(c.stTotal):'—','var(--text)'],
    ['Situations émises',c.stSitTotal>0?eurRaw(c.stSitTotal):'—','var(--text)'],
    ['DC4 manquants',c.stDC4>0?c.stDC4:'0',c.stDC4>0?'var(--neg)':'var(--pos)'],
  ];
  const rows=d.st.flatMap((s,i)=>{
    const dc4Color=s.dc4==='Oui'?'var(--pos)':'var(--neg)';
    const agColor=s.agrement==='Oui'?'var(--pos)':'var(--warn)';
    return[
      `<tr>
      <td><span class="dot" style="background:${s.entreprise?(s.dc4==='Oui'?'var(--pos)':'var(--warn)'):'var(--border)'}"></span></td>
      <td><input type="text" name="st.${i}.entreprise" value="${esc(s.entreprise)}" style="width:140px"></td>
      <td><input type="text" name="st.${i}.lot" value="${esc(s.lot)}" style="width:100px"></td>
      <td><select name="st.${i}.categorie">
        ${['ST Moyen','ST Compétence'].map(v=>`<option${s.categorie===v?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.montantHT" value="${s.montantHT||''}" style="width:90px"></div></td>
      <td style="color:${dc4Color};font-weight:600">
        <select name="st.${i}.dc4" style="color:${dc4Color}">
          ${['Oui','Non'].map(v=>`<option${s.dc4===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td style="color:${agColor};font-weight:600">
        <select name="st.${i}.agrement" style="color:${agColor}">
          ${['Oui','Non'].map(v=>`<option${s.agrement===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.mtSit" value="${s.mtSit||''}" style="width:85px"></div></td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="st.${i}.rg" value="${s.rg||''}" style="width:70px"></div></td>
      <td><select name="st.${i}.statut">
        ${['—','En cours','Terminé','Litigieux'].map(v=>`<option${s.statut===v?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td style="white-space:nowrap">
        <button class="detail-expand-btn" data-action="toggleDetail" data-key="st${i}" title="Détail">▼ Détail</button>
        <button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="st" data-idx="${i}">${svgIcon(ico.trash,13)}</button>
      </td>
    </tr>`,
      `<tr id="detail-row-st${i}" class="detail-row" style="display:${s.obs?'table-row':'none'}">
        <td colspan="11">
          <label class="form-label" style="display:block;margin-bottom:4px">Descriptif des travaux / prestations du sous-traitant</label>
          <textarea name="st.${i}.obs" class="form-textarea" rows="3" style="width:100%;max-width:700px">${esc(s.obs||'')}</textarea>
        </td>
      </tr>`
    ];
  }).join('');
  return`
    <div class="page-head"><h1 class="page-title">Sous-traitants</h1>${csvBtn('st')}</div>
    <div class="kpi-strip">
      ${stKpis.map(([l,v,col])=>`<div class="kpi-card"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${col};font-size:17px">${v}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Liste des sous-traitants <span class="note" style="font-size:11px;margin-left:6px">— Cliquez "▼ Détail" pour ajouter un descriptif</span></div>
      <div style="display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--sub)">
        <span><span class="dot" style="background:var(--pos);display:inline-block;margin-right:4px"></span>DC4 conforme</span>
        <span><span class="dot" style="background:var(--warn);display:inline-block;margin-right:4px"></span>DC4 à régulariser</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th></th><th>Entreprise</th><th>Lot</th><th>Catégorie</th><th>Marché HT</th><th>DC4</th><th>Agrément</th><th>Mt Situation</th><th>RG</th><th>Statut</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="st">${svgIcon(ico.plus,13)} Ajouter sous-traitant</button>
    </div>
  `;
}

// Fournisseurs
function renderFournisseurs(d,c){
  const rows=d.fournisseurs.map((f,i)=>`<tr>
    <td><input type="text" name="fournisseurs.${i}.fournisseur" value="${esc(f.fournisseur)}" style="width:130px"></td>
    <td><input type="text" name="fournisseurs.${i}.designation" value="${esc(f.designation)}" style="width:150px"></td>
    <td><select name="fournisseurs.${i}.categorie">
      ${['Fournitures','Matériel','Services'].map(v=>`<option${f.categorie===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><input type="text" name="fournisseurs.${i}.numBC" value="${esc(f.numBC)}" style="width:90px"></td>
    <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="fournisseurs.${i}.montant" value="${f.montant||''}" style="width:90px"></div></td>
    <td><input type="date" name="fournisseurs.${i}.livraison" value="${f.livraison||''}"></td>
    <td><select name="fournisseurs.${i}.recu">
      ${['Non','Oui','Partiel'].map(v=>`<option${f.recu===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><select name="fournisseurs.${i}.statut">
      ${['—','En commande','Livré','Litigieux'].map(v=>`<option${f.statut===v?' selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="fournisseurs" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
  </tr>`).join('');
  return`
    <div class="page-head"><h1 class="page-title">Fournisseurs</h1>${csvBtn('fournisseurs')}</div>
    <div class="kpi-strip">

// ─── getVal helper ────────────────────────────────────────────────────────────
function getVal(d,path){
  const parts=path.split('.');
  let obj=d;
  for(const k of parts){
    if(obj===null||obj===undefined)return'';
    obj=obj[k];
  }
  return obj??'';
}

const TASK_STATS=['À faire','En cours','Terminé','Bloqué'];
const STAT_CLASS={'À faire':'st-afaire','En cours':'st-encours','Terminé':'st-termine','Bloqué':'st-bloque'};
function normStatut(s){const v=(s||'').toLowerCase();if(v.includes('termin'))return'Terminé';if(v.includes('bloq'))return'Bloqué';if(v.includes('cours'))return'En cours';return'À faire';}
function prioClass(p){const v=(p||'Normale').toLowerCase();return v.includes('urg')?'urgente':v.includes('bass')?'basse':'normale';}

function exportWeeklyPdf(){
  const ch=getActive();if(!ch)return;const d=ch.d,c=computeAll(d);
  const now=new Date();const from=new Date(now.getTime()-7*86400000);
  const week=(d.journal||[]).filter(e=>e.date&&new Date(e.date+'T12:00')>=from);
  const today=new Date();today.setHours(0,0,0,0);

function devisTotals(dv){
  let ht=0,tva=0;

  });
  return{ht,tva,ttc:ht+tva};
}

  const yr=new Date().getFullYear();

  const dv={id:'dv'+Date.now(),num,client:client||'',date:todayISO(),validite:'30',statut:'Brouillon',notes:'',
    lignes:Array.from({length:4},()=>({designation:'',qte:'',unite:'',pu:'',tva:'20'}))};

function devisToChantier(id){
  const dv=state.devisData.list.find(x=>x.id===id);if(!dv)return;
  if(!confirm('Créer une petite intervention à partir de ce devis ?'))return;
  const t=devisTotals(dv);
  const ch=newChantier('petite');
  ch.d.ident.nom=(dv.client?dv.client+' — ':'')+dv.num;
  ch.d.petite.client=dv.client||'';
  ch.d.petite.montant=String(Math.round(t.ht));
  const lignes=(dv.lignes||[]).filter(l=>l.designation).map(l=>({designation:l.designation,qte:l.qte,pu:l.pu}));
  while(lignes.length<3)lignes.push({designation:'',qte:'',pu:''});
  ch.d.petite.fournitures=lignes;
  // heures MO estimées depuis la base de cadences → pré-remplies dans la fiche
  const hEst=devisHeures(dv);
  if(hEst>0){
    ch.d.petite.mainoeuvre[0]={intervenant:'Équipe (estimation devis)',date:'',heures:String(Math.round(hEst)),taux:'37.3'};
  }
  dv.statut='Accepté';
  save();saveDevis();
  state.devisId=null;state.screen='home';render();
}

// Heures MO estimées d'un devis : Σ qté × temps unitaire (h/u), × coefficient chantier
function devisHeures(dv){
  const coeff=n(dv.coeff)||1;
  let h=0;
  (dv.lignes||[]).forEach(l=>{h+=n(l.qte)*n(l.tps);});
  return h*coeff;
}

// Wrapper : préserve le focus & le curseur du champ en cours d'édition à travers
// le re-rendu (confort de saisie, surtout sur mobile).
function render(){
  const ae=document.activeElement;
  const fn=(ae&&ae.name&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))?ae.name:null;
  const car=(fn&&typeof ae.selectionStart==='number')?ae.selectionStart:null;
  renderMain();
  if(fn){
    const sel='[name="'+((window.CSS&&CSS.escape)?CSS.escape(fn):fn)+'"]';
    const el=document.querySelector(sel);
    if(el){try{el.focus({preventScroll:true});if(car!=null&&el.setSelectionRange)el.setSelectionRange(car,car);}catch(e){}}
  }
}
const SCREEN_TITLES={hub:'Menu',portfolio:'Chantiers',crm:'CRM',devis:'Devis',home:'Cockpit',dashboard:'Tableau de bord',finance:'Finances',st:'Sous-traitants',fournisseurs:'Fournisseurs',planning:'Planning',heures:'Heures MO',reserves:'Réserves',checklist:'Check-list',ts:'TS & Aléas',cr:'CR Chantier',tasks:'Tâches',journal:'Journal',photos:'Photos',documents:'Documents'};
function renderMain(){
  applyTheme();
  document.title=(SCREEN_TITLES[state.screen]?SCREEN_TITLES[state.screen]+' — ':'')+'Suivi de Chantier Pro';
  renderShell();
  renderNav();
  renderMobileNav();
  const main=document.getElementById('main');
  const ch=getActive();
  // Applications globales (indépendantes d'un chantier actif)
  if(state.screen==='hub'){main.innerHTML=renderHub();renderFab();return;}
  if(state.screen==='crm'){
    main.innerHTML=renderCRM();
    const cs=document.getElementById('crm-search');
    if(cs)cs.addEventListener('input',e=>{
      state.crmQuery=e.target.value;render();
      const el=document.getElementById('crm-search');
      if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
    });
    renderFab();return;
  }
  if(state.screen==='devis'){
    main.innerHTML=renderDevis();
    const bs=document.getElementById('bib-search');
    if(bs)bs.addEventListener('input',e=>{
      state.bibQuery=e.target.value;render();
      const el=document.getElementById('bib-search');
      if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
    });
    renderFab();return;
  }
  if(state.screen==='portfolio'){
    main.innerHTML=renderPortfolio();
    const pfs=document.getElementById('pf-search');
    if(pfs&&pfs.addEventListener)pfs.addEventListener('input',e=>{state.pfQuery=e.target.value;render()});
    renderFab();
    return;
  }
  if(!ch){
    main.innerHTML=`<div style="padding:40px;text-align:center;color:var(--sub)">
      <p>Aucun chantier sélectionné.</p>
      <button class="btn btn-primary" style="margin-top:12px" data-action="addChantier">Créer un chantier</button>
    </div>`;
    renderFab();
    return;
  }
  const d=ch.d;
  // Petite intervention : fiche unique sur une seule page
  if(d.type==='petite'){
    main.innerHTML=renderPetite(d);
    renderFab();
    return;
  }
  const c=computeAll(d);
  const screens={
    home:()=>renderHome(d,c),
    dashboard:()=>renderDashboard(d,c),
    finance:()=>renderFinance(d,c),
    st:()=>renderST(d,c),
    fournisseurs:()=>renderFournisseurs(d,c),
    planning:()=>renderPlanning(d,c),
    heures:()=>renderHeures(d,c),
    reserves:()=>renderReserves(d,c),
    checklist:()=>renderChecklist(d,c),
    ts:()=>renderTS(d,c),
    cr:()=>renderCR(d,c),
    tasks:()=>renderTasks(d,c),
    journal:()=>renderJournal(d,c),
    photos:()=>renderPhotos(d,c),
    documents:()=>renderDocuments(d,c),
  };
  const fn=screens[state.screen];
  main.innerHTML=fn?fn():`<div style="padding:40px;color:var(--sub)">Écran inconnu : ${esc(state.screen)}</div>`;
  renderFab();
  // Recherche documents (préserve le focus pendant la frappe)
  if(state.screen==='documents'){
    const ds=document.getElementById('doc-search');
    if(ds)ds.addEventListener('input',e=>{
      state.docQuery=e.target.value;render();
      const el=document.getElementById('doc-search');
      if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
    });
  }
}

      <div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" data-action="dupChantier" data-id="${ch.id}" title="Dupliquer">${svgIcon(ico.copy,13)} Dupliquer</button>
        <button class="btn btn-danger btn-sm" data-action="delChantier" data-id="${ch.id}" title="Supprimer">${svgIcon(ico.trash,13)} Supprimer</button>
      </div>
    </div>`;
  }).join('');

  return`
    <div class="kpi-strip" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card"><div class="kpi-label">Chantiers</div><div class="kpi-value">${total}</div></div>
      <div class="kpi-card"><div class="kpi-label">Marché cumulé</div><div class="kpi-value" style="font-size:16px">${marcheCum>0?eurRaw(marcheCum):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Marge cumulée</div><div class="kpi-value" style="font-size:16px;color:${margeCum<0?'var(--neg)':'var(--pos)'}">${marcheCum>0?eurRaw(margeCum):'—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Alertes totales</div><div class="kpi-value" style="color:${alertCum>0?'var(--warn)':'var(--sub)'}">${alertCum||'0'}</div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <input type="text" class="form-input" id="pf-search" placeholder="Rechercher un chantier…" value="${esc(state.pfQuery)}" style="max-width:260px">
      <div class="filter-chips">
        ${['all','Préparation','En cours','Livraison','Réceptionné'].map(s=>`
          <button class="chip${(state.pfStatut||'all')===s?' active':''}" data-action="pfFilter" data-val="${s}">${s==='all'?'Tous':s}</button>
        `).join('')}
      </div>
    </div>
    <div class="section-title">Nouveau chantier</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:16px">
      <div class="add-type" data-action="addChantierType" data-val="grosse">
        <div class="at-ic" style="background:#e8f1fd;color:var(--acc)">${svgIcon(ico.dash,24)}</div>
        <span style="font-size:14px;font-weight:700">🏗️ Grosse intervention</span>
        <span style="font-size:12px;color:var(--sub)">Suivi complet : finances, planning, cadences, sous-traitants, journal, photos…</span>
      </div>
      <div class="add-type" data-action="addChantierType" data-val="petite">
        <div class="at-ic" style="background:#fff3e0;color:var(--warn)">${svgIcon(ico.cr,24)}</div>
        <span style="font-size:14px;font-weight:700">⚡ Petite intervention</span>
        <span style="font-size:12px;color:var(--sub)">Fiche 1 page : fournitures, matériel, main d'œuvre & marge</span>
      </div>
    </div>
    ${cards?`<div class="section-title">Chantiers</div><div class="pf-grid">${cards}</div>`:`<div style="color:var(--sub);padding:20px;text-align:center">Aucun chantier pour l'instant — créez-en un ci-dessus.</div>`}
  `;
}

// ─── Petite intervention : fiche 1 page ───────────────────────────────────────
function typeToggle(d){
  const petite=d.type==='petite';
  return`<div class="type-bar">
    <div class="tb-label">${svgIcon(ico.edit,13)} Type d'intervention</div>
    <div class="seg">
      <button class="${!petite?'active':''}" data-action="setType" data-val="grosse">${svgIcon(ico.dash,13)} Grosse</button>
      <button class="${petite?'active':''}" data-action="setType" data-val="petite">${svgIcon(ico.cr,13)} Petite</button>
    </div>
  </div>`;
}
function renderPetite(d){
  const p=d.petite;
  const lineTot=x=>n(x.qte)*n(x.pu);
  const totF=p.fournitures.reduce((s,x)=>s+lineTot(x),0);
  const totM=p.materiel.reduce((s,x)=>s+lineTot(x),0);
  const totH=p.mainoeuvre.reduce((s,x)=>s+n(x.heures),0);
  const totMO=p.mainoeuvre.reduce((s,x)=>s+n(x.heures)*n(x.taux),0);
  const debourse=totF+totM+totMO;
  const recette=n(p.montant);
  const marge=recette-debourse;
  const taux=recette>0?marge/recette*100:0;
  const margeColor=marge<0?'var(--neg)':'var(--pos)';

  const qtyTable=(list,path,unitLabel)=>`
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Désignation</th><th>Qté</th><th>PU HT</th><th>Total</th><th></th></tr></thead>
        <tbody>${list.map((f,i)=>`<tr>
          <td><input type="text" name="petite.${path}.${i}.designation" value="${esc(f.designation)}" style="min-width:120px;width:100%" placeholder="${unitLabel}"></td>
          <td><input type="number" name="petite.${path}.${i}.qte" value="${f.qte||''}" style="width:58px" placeholder="0"></td>
          <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="petite.${path}.${i}.pu" value="${f.pu||''}" style="width:72px" placeholder="0"></div></td>
          <td class="auto" style="font-weight:600">${lineTot(f)>0?eurRaw(lineTot(f)):'—'}</td>
          <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="petite.${path}" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <button class="add-row-btn" data-action="addRow" data-list="petite.${path}">${svgIcon(ico.plus,13)} Ajouter une ligne</button>`;

  const moRows=p.mainoeuvre.map((m,i)=>{
    const cout=n(m.heures)*n(m.taux);
    return`<tr>
      <td><input type="text" name="petite.mainoeuvre.${i}.intervenant" value="${esc(m.intervenant)}" style="min-width:110px;width:100%" placeholder="Intervenant"></td>
      <td><input type="date" name="petite.mainoeuvre.${i}.date" value="${m.date||''}"></td>
      <td style="white-space:nowrap"><input type="number" name="petite.mainoeuvre.${i}.heures" value="${m.heures||''}" style="width:56px" placeholder="0"> h</td>
      <td><div class="amt-cell"><span class="sym">€</span><input type="number" name="petite.mainoeuvre.${i}.taux" value="${m.taux||''}" style="width:60px"></div></td>
      <td class="auto" style="font-weight:600">${cout>0?eurRaw(cout):'—'}</td>
      <td><button class="btn btn-danger btn-icon btn-sm" data-action="delRow" data-list="petite.mainoeuvre" data-idx="${i}">${svgIcon(ico.trash,13)}</button></td>
    </tr>`;
  }).join('');

  const recapLine=(label,val,color)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px"><span style="color:var(--sub)">${label}</span><strong style="${color?`color:${color}`:''}">${val}</strong></div>`;

  return`
    ${typeToggle(d)}
    <div class="petite-banner">
      <div class="pb-ic">${svgIcon(ico.cr,20)}</div>
      <div style="flex:1">
        <div class="pb-t">${esc(d.ident.nom||'Petite intervention')}</div>
        <div class="pb-s">Fiche d'intervention rapide · fournitures, matériel, main d'œuvre & marge sur une page</div>
      </div>
    </div>

    <!-- Récap KPI -->
    <div class="cockpit-grid">
      <div class="ck-card"><div class="ck-head">Montant vendu (HT)</div><div class="ck-val" style="font-size:20px;color:var(--acc)">${recette>0?eurRaw(recette):'—'}</div></div>
      <div class="ck-card"><div class="ck-head">Déboursé total</div><div class="ck-val" style="font-size:20px">${debourse>0?eurRaw(debourse):'—'}</div><div style="font-size:11px;color:var(--sub)">Fourn. ${eurRaw(totF)} · Mat. ${eurRaw(totM)} · MO ${eurRaw(totMO)}</div></div>
      <div class="ck-card"><div class="ck-head">Marge</div><div class="ck-val" style="font-size:20px;color:${margeColor}">${recette>0||debourse>0?eurRaw(marge):'—'}</div><div style="font-size:11px;color:var(--sub)">${recette>0?pct(taux):''}</div></div>
      <div class="ck-card"><div class="ck-head">Heures</div><div class="ck-val" style="font-size:20px">${totH>0?totH+' h':'—'}</div></div>
    </div>

    <!-- En-tête devis -->
    <div class="card" style="margin-bottom:14px">
      <div class="form-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
        <div class="form-field"><label class="form-label">Intitulé / chantier</label><input type="text" name="ident.nom" value="${esc(d.ident.nom)}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Client</label><input type="text" name="petite.client" value="${esc(p.client)}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Adresse</label><input type="text" name="ident.adresse" value="${esc(d.ident.adresse)}" class="form-input"></div>
        <div class="form-field"><label class="form-label">Montant vendu HT</label><div class="amt-cell"><span class="sym">€</span><input type="number" name="petite.montant" value="${p.montant||''}" class="form-input" placeholder="0"></div></div>
      </div>
    </div>

    <!-- Fournitures -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">${svgIcon(ico.fourn,13)} Fournitures</div>
        <strong style="font-size:14px">${totF>0?eurRaw(totF):'—'}</strong>
      </div>
      ${qtyTable(p.fournitures,'fournitures','Fourniture')}
    </div>

    <!-- Matériel -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">${svgIcon(ico.plan,13)} Matériel</div>
        <strong style="font-size:14px">${totM>0?eurRaw(totM):'—'}</strong>
      </div>
      ${qtyTable(p.materiel,'materiel','Matériel / location')}
    </div>

    <!-- Main d'œuvre / heures -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">${svgIcon(ico.heure,13)} Main d'œuvre & heures</div>
        <div style="font-size:13px">${totH>0?`<strong>${totH} h</strong> · `:''}<strong>${totMO>0?eurRaw(totMO):'—'}</strong></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Intervenant</th><th>Date</th><th>Heures</th><th>Taux</th><th>Coût</th><th></th></tr></thead>
          <tbody>${moRows}</tbody>
        </table>
      </div>
      <button class="add-row-btn" data-action="addRow" data-list="petite.mainoeuvre">${svgIcon(ico.plus,13)} Ajouter une ligne</button>
    </div>

    <!-- Récap financier -->
    <div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:8px">${svgIcon(ico.fin,14)} Récapitulatif financier</div>
      ${recapLine('Fournitures',eurRaw(totF))}
      ${recapLine('Matériel',eurRaw(totM))}
      ${recapLine("Main d'œuvre ("+totH+" h)",eurRaw(totMO))}
      ${recapLine('= Déboursé total',eurRaw(debourse))}
      ${recapLine('Montant vendu HT',recette>0?eurRaw(recette):'—','var(--acc)')}
      <div style="display:flex;justify-content:space-between;padding:10px 0 2px;font-size:16px"><span style="font-weight:700">Marge</span><strong style="color:${margeColor}">${(recette>0||debourse>0)?eurRaw(marge):'—'}${recette>0?' · '+pct(taux):''}</strong></div>
      ${recette>0?`<div class="prog-bar" style="height:10px;margin-top:6px"><div class="prog-fill" style="width:${Math.max(0,Math.min(taux,100))}%;background:${margeColor}"></div></div>`:''}
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="form-field"><label class="form-label">Notes</label><textarea class="form-textarea" name="petite.notes" placeholder="Observations, matériaux à prévoir, suite à donner…">${esc(p.notes)}</textarea></div>
    </div>
  `;
}

// ─── Home / Cockpit chantier ──────────────────────────────────────────────────
function renderHome(d,c){
  const s=summarize(d);
  const today=new Date();today.setHours(0,0,0,0);
  const av=Math.round(c.planAv);
  const ringColor=av>=100?'var(--pos)':av>=50?'var(--acc)':'var(--warn)';

  // Tâches en retard
  const retards=d.planning.filter(t=>t.tache&&t.fin&&t.statut!=='Terminé'&&t.statut!=='terminé'&&new Date(t.fin)<today);
  // Prochaines échéances (tâches + jalons à venir)
  const ech=[];
  d.planning.forEach(t=>{if(t.tache&&t.fin&&t.statut!=='Terminé'&&t.statut!=='terminé'&&new Date(t.fin)>=today)ech.push({date:t.fin,label:t.tache,type:'Tâche'});});
  d.jalons.forEach(j=>{if(j.nom&&j.datePrev&&!j.dateReel&&new Date(j.datePrev)>=today)ech.push({date:j.datePrev,label:j.nom,type:'Jalon'});});
  ech.sort((a,b)=>a.date.localeCompare(b.date));
  // Derniers événements = entrées de journal récentes
  const events=(d.journal||[]).slice(0,4);
  const lastMeteo=(d.journal||[])[0]?.meteo||'';
  // Avancement par lot
  const lotMap={};
  d.planning.forEach(t=>{if(!t.tache)return;const lot=(t.lot||'').trim()||'Général';if(!lotMap[lot])lotMap[lot]={b:0,ev:0,sum:0,nb:0};const b=n(t.budgetPrevu),a=n(t.avancement);lotMap[lot].b+=b;lotMap[lot].ev+=b*a/100;lotMap[lot].sum+=a;lotMap[lot].nb++;});
  const lots=Object.entries(lotMap).map(([nom,v])=>({nom,pct:Math.round(v.b>0?v.ev/v.b*100:(v.nb?v.sum/v.nb:0))}));
  const sugg=aiSuggestions(d);
  const nbTasks=d.planning.filter(t=>t.tache).length;

  function tile(screen,icon,name,sub,color){
    return`<div class="tile" data-screen="${screen}">
      <div class="tile-icon" style="background:${color}20">${svgIcon(icon,22,`style="color:${color}"`)}</div>
      <div class="tile-name">${name}</div>
      ${sub?`<div class="tile-sub">${sub}</div>`:''}
    </div>`;
  }

  return`
    ${typeToggle(d)}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap">
      <div>
        <h1 class="page-title" style="margin:0">${esc(d.ident.nom||'Mon chantier')}</h1>
        ${d.ident.adresse?`<div style="font-size:12px;color:var(--sub)">${esc(d.ident.adresse)}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${lastMeteo?`<span class="pill st-encours">${esc(lastMeteo)}</span>`:''}
        <span class="badge ${statusBadge(s.statut)}">${s.statut}</span>
      </div>
    </div>

    <div class="cockpit-grid">
      <div class="ck-card">
        <div class="ck-head">${svgIcon(ico.plan,14)} Avancement global</div>
        <div class="ring-wrap">
          <div class="ring" style="--p:${Math.min(av,100)};background:conic-gradient(${ringColor} calc(var(--p)*1%),var(--border) 0)"><span>${av}%</span></div>
          <div style="font-size:12px;color:var(--sub)">
            ${nbTasks} tâche${nbTasks>1?'s':''}<br>
            avancement moyen
          </div>
        </div>
      </div>
      <div class="ck-card" data-screen="tasks" style="cursor:pointer">
        <div class="ck-head">${svgIcon(ico.warn,14)} Tâches en retard</div>
        <div class="ck-val" style="color:${retards.length?'var(--neg)':'var(--pos)'}">${retards.length}</div>
        <div style="font-size:12px;color:var(--sub)">${retards.length?esc(retards[0].tache):'Tout est à jour ✓'}</div>
      </div>
      <div class="ck-card">
        <div class="ck-head">${svgIcon(ico.fin,14)} Marge brute</div>
        <div class="ck-val" style="font-size:20px;color:${c.margeBrute<0?'var(--neg)':'var(--pos)'}">${c.budgetCR>0?eurRaw(c.margeBrute):'—'}</div>
        <div style="font-size:12px;color:var(--sub)">${c.budgetCR>0?pct(c.tauxMarge):'À renseigner'}</div>
      </div>
      <div class="ck-card" data-screen="dashboard" style="cursor:pointer">
        <div class="ck-head">${svgIcon(ico.bell,14)} Alertes</div>
        <div class="ck-val" style="color:${c.alerts.length?'var(--warn)':'var(--pos)'}">${c.alerts.length}</div>
        <div style="font-size:12px;color:var(--sub)">${c.alerts.length?esc(c.alerts[0].msg):'Aucune alerte'}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" class="cockpit-2col">
      <div class="ck-card">
        <div class="ck-head" style="margin-bottom:8px">${svgIcon(ico.cal,14)} Prochaines échéances</div>
        ${ech.length?ech.slice(0,5).map(e=>{
          const late=false;
          return`<div class="event-item"><span class="event-dot" style="background:${e.type==='Jalon'?'var(--warn)':'var(--acc)'}"></span>
            <div style="flex:1"><div>${esc(e.label)}</div><div style="font-size:11px;color:var(--sub)">${e.type} · ${fmtDateFR(e.date)}</div></div></div>`;
        }).join(''):'<div style="color:var(--sub);font-size:13px">Aucune échéance à venir. Ajoutez des dates de fin aux tâches.</div>'}
      </div>
      <div class="ck-card">
        <div class="ck-head" style="margin-bottom:8px">${svgIcon(ico.journal,14)} Derniers événements</div>
        ${events.length?events.map(e=>`<div class="event-item"><span class="event-dot"></span>
          <div style="flex:1"><div>${esc((e.travaux||e.resume||'Entrée de journal').slice(0,70))}</div>
          <div style="font-size:11px;color:var(--sub)">${fmtDateFR(e.date)}${e.meteo?' · '+esc(e.meteo):''}</div></div></div>`).join('')
          :`<div style="color:var(--sub);font-size:13px">Aucune entrée. <a href="#" data-action="addJournalToday" style="color:var(--acc)">+ Ajouter aujourd'hui</a></div>`}
      </div>
    </div>

    ${lots.length?`<div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:10px">${svgIcon(ico.dash,14)} Avancement par lot</div>
      ${lots.map(l=>`<div class="lot-row">
        <span class="lot-name">${esc(l.nom)}</span>
        <div class="lot-bar"><div class="lot-fill" style="width:${Math.min(l.pct,100)}%;background:${l.pct>=100?'var(--pos)':l.pct>=50?'var(--acc)':'var(--warn)'}"></div></div>
        <span class="lot-pct">${l.pct}%</span>
      </div>`).join('')}
      <div class="note" style="margin-top:4px">Regroupé par le champ « Lot » des tâches (rubrique Tâches / Planning).</div>
    </div>`:''}

    ${sugg.length?`<div class="ck-card" style="margin-bottom:16px">
      <div class="ck-head" style="margin-bottom:8px">${svgIcon(ico.spark,14)} Suggestions</div>
      ${sugg.map(x=>`<div class="event-item"><span class="event-dot" style="background:var(--warn)"></span><div style="flex:1">${esc(x)}</div></div>`).join('')}
    </div>`:''}

    <div class="tile-group-label">Tous les modules</div>
    <div class="tile-grid">
      ${tile('tasks',ico.kanban,'Tâches',`${nbTasks} tâche(s)`,'#0070f2')}
      ${tile('journal',ico.journal,'Journal',`${(d.journal||[]).length} entrée(s)`,'#107e3e')}
      ${tile('photos',ico.camera,'Photos',`${(d.photos||[]).length} photo(s)`,'#e76500')}
      ${tile('documents',ico.folder,'Documents',`${(d.documents||[]).length} doc(s)`,'#5b738b')}
      ${tile('dashboard',ico.dash,'Tableau de bord',c.alerts.length?`${c.alerts.length} alerte(s)`:'Vue synthèse','#e76500')}
      ${tile('finance',ico.fin,'Finances / RAF',c.budgetCR>0?pct(c.tauxMarge)+' marge':'Budget & situations','#0070f2')}
      ${tile('planning',ico.plan,'Planning détaillé',c.planAv>0?pct(c.planAv):'Budget par tâche','#107e3e')}
      ${tile('heures',ico.heure,'Heures MO',c.hBudg>0?`${c.hConso||0}/${c.hBudg} h`:'Pointage','#107e3e')}
      ${tile('st',ico.st,'Sous-traitants',c.stActifs?`${c.stActifs} actifs`:'ST','#5b738b')}
      ${tile('fournisseurs',ico.fourn,'Fournisseurs',c.fournActifs?`${c.fournActifs}`:'Achats','#5b738b')}
      ${tile('reserves',ico.res,'Réserves',c.resOuvertes?`${c.resOuvertes} ouverte(s)`:'OPR/OPL','#d20a0a')}
      ${tile('ts',ico.ts,'TS & Aléas',c.tsEnAttente?`${c.tsEnAttente} en attente`:'Travaux suppl.','#e76500')}
      ${tile('cr',ico.cr,'CR Chantier',c.crCount?`${c.crCount} CR`:'Comptes rendus','#5b738b')}
      ${tile('checklist',ico.check,'Check-list',`${c.clDDone+c.clRDone}/${d.checklistDemarrage.length+d.checklistReception.length}`,'#107e3e')}
    </div>
  `;
}
// ─── Init ─────────────────────────────────────────────────────────────────────
load();
if(state.chantiers.length===0){
  newChantier();
}else if(!state.activeId){
  state.activeId=state.chantiers[0].id;
}
// Démarrage sur le menu principal (Chantiers / CRM / Devis)
state.screen='hub';
render();
</script>
</body>
</html>
